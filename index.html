<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Character Studio</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <!-- Firebase -->
  <script type="module" id="firebase-init">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, getDocs, deleteDoc, writeBatch }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCiT2WzI9myM9wbsN2_FEV_HzK2LC1WNfs",
      authDomain: "character-studio-15bf7.firebaseapp.com",
      projectId: "character-studio-15bf7",
      storageBucket: "character-studio-15bf7.firebasestorage.app",
      messagingSenderId: "120657598965",
      appId: "1:120657598965:web:9aac731e87a09e7ab528bc"
    };

    const app      = initializeApp(firebaseConfig);
    const auth     = getAuth(app);
    const db       = getFirestore(app);
    const provider = new GoogleAuthProvider();

    window.__firebase = {
      auth, db, provider,
      signIn:  () => signInWithPopup(auth, provider),
      signOut: () => signOut(auth),
      onAuth:  (cb) => onAuthStateChanged(auth, cb),
      // Firestore helpers
      userDoc: (uid, path) => doc(db, "users", uid, ...path.split("/")),
      setUserDoc: async (uid, path, data) => {
        await setDoc(doc(db, "users", uid, ...path.split("/")), data, { merge: true });
      },
      getUserDoc: async (uid, path) => {
        const snap = await getDoc(doc(db, "users", uid, ...path.split("/")));
        return snap.exists() ? snap.data() : null;
      },
      getUserCollection: async (uid, col) => {
        const snap = await getDocs(collection(db, "users", uid, col));
        return snap.docs.map(d => ({ id: d.id, ...d.data() }));
      },
      saveBot: async (uid, bot) => {
        await setDoc(doc(db, "users", uid, "bots", bot.id), bot);
      },
      deleteBot: async (uid, botId) => {
        await deleteDoc(doc(db, "users", uid, "bots", botId));
      },
      saveBots: async (uid, bots) => {
        const batch = writeBatch(db);
        bots.forEach(b => batch.set(doc(db, "users", uid, "bots", b.id), b));
        await batch.commit();
      },
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=Courier+Prime:ital@0;1&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #e8dfc8;
      --paper:       #f5f0e0;
      --paper-dark:  #e6dcc5;
      --paper-line:  #c8b990;
      --sc-bg:       #ede3c4;
      --sc-border:   #b09a6a;
      --ink:         #1a1208;
      --ink-mid:     #3e3320;
      --ink-faint:   #9e8f72;
      --red:         #8b2e1a;
      --tape:        rgba(245,225,120,0.85);
      --shadow:      rgba(80,55,20,0.16);
      --body-line-h: #c8b990;
      --body-line-v: transparent;
      --panel-bg:    #ede5cc;
      --chat-user:   #e6dcc5;
      --chat-ai:     #f5f0e0;
    }
    html.dark {
      --bg:          #0f0e0b;
      --paper:       #1a1810;
      --paper-dark:  #222018;
      --paper-line:  #2e2b20;
      --sc-bg:       #13120d;
      --sc-border:   #3a3628;
      --ink:         #d2c8a6;
      --ink-mid:     #a8987a;
      --ink-faint:   #5e5540;
      --red:         #c45a3c;
      --tape:        rgba(65,58,28,0.9);
      --shadow:      rgba(0,0,0,0.55);
      --body-line-h: rgba(210,190,130,0.07);
      --body-line-v: rgba(210,190,130,0.03);
      --panel-bg:    #161410;
      --chat-user:   #222018;
      --chat-ai:     #1a1810;
    }

    /* ── smooth theme fade ── */
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      transition:
        background-color 0.4s ease,
        border-color     0.4s ease,
        color            0.4s ease,
        box-shadow       0.4s ease;
    }
    /* don't animate layout/transform/opacity with theme transition */
    *, *::before, *::after {
      transition:
        background-color 0.4s ease,
        border-color     0.4s ease,
        color            0.4s ease,
        box-shadow       0.4s ease,
        transform        0.2s ease,
        opacity          0.2s ease;
    }

    body {
      font-family: 'Lora', Georgia, serif;
      background-color: var(--bg);
      background-image:
        repeating-linear-gradient(transparent 0px,transparent 27px,var(--body-line-h) 27px,var(--body-line-h) 28.5px),
        repeating-linear-gradient(90deg,transparent 0px,transparent 27px,var(--body-line-v) 27px,var(--body-line-v) 28.5px);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--paper-line); border-radius: 3px; }

    /* ── FAB copy ── */
    .fab-cluster {
      position: fixed; bottom: 28px; right: 26px;
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 10px; z-index: 300;
    }
    .fab-copy {
      background: var(--ink); color: var(--paper);
      border: none; cursor: pointer; padding: 14px 26px;
      font-family: 'Courier Prime', monospace;
      font-size: 0.88rem; text-transform: uppercase; letter-spacing: 1.2px;
      display: flex; align-items: center; gap: 10px;
      box-shadow: 4px 5px 0 var(--shadow); white-space: nowrap;
    }
    .fab-copy:hover  { background: var(--red); transform: translateY(-2px); }
    .fab-copy:active { transform: scale(0.97); }
    .fab-copy.ok     { background: #2c6e3a; }
    .fab-copy-icon   { font-size: 1.1rem; line-height: 1; }

    /* ── DASHBOARD ── */
    .dashboard { max-width: 1080px; margin: 0 auto; padding: 48px 28px 120px; }
    .dash-header { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:44px; padding-bottom:14px; border-bottom:2.5px solid var(--ink); gap:16px; flex-wrap:wrap; }
    .dash-title  { font-family:'Playfair Display',serif; font-size:clamp(1.9rem,4vw,2.6rem); font-weight:700; line-height:1; }
    .dash-subtitle { font-family:'Courier Prime',monospace; font-size:0.71rem; color:var(--ink-faint); text-transform:uppercase; letter-spacing:2px; margin-top:6px; }
    .btn-new { font-family:'Courier Prime',monospace; font-size:0.82rem; background:var(--ink); color:var(--paper); border:none; padding:11px 22px; cursor:pointer; letter-spacing:1.2px; text-transform:uppercase; white-space:nowrap; }
    .btn-new:hover { background:var(--red); transform:translateY(-1px); }
    .dash-actions { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .btn-dash-util { font-family:'Courier Prime',monospace; font-size:0.78rem; background:none; border:1.5px solid var(--ink-faint); color:var(--ink-faint); padding:9px 14px; cursor:pointer; text-transform:uppercase; letter-spacing:1px; white-space:nowrap; }
    .btn-dash-util:hover { border-color:var(--ink); color:var(--ink); }

    .bots-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(248px,1fr)); gap:28px; }
    .empty-state { grid-column:1/-1; text-align:center; padding:90px 20px; color:var(--ink-faint); }
    .empty-title { font-family:'Playfair Display',serif; font-size:1.4rem; font-style:italic; margin-bottom:10px; }
    .empty-hint  { font-family:'Courier Prime',monospace; font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; }
    .bot-card { background:var(--paper); border:1px solid var(--paper-dark); padding:22px 20px 18px; cursor:pointer; position:relative; box-shadow:4px 5px 0 var(--shadow); }
    .bot-card::before { content:''; position:absolute; top:-6px; left:50%; transform:translateX(-50%); width:64px; height:10px; background:var(--tape); border:1px solid rgba(160,130,30,0.3); }
    .bot-card:nth-child(3n+1) { transform:rotate(-0.6deg); }
    .bot-card:nth-child(3n+2) { transform:rotate(0.4deg); }
    .bot-card:nth-child(3n+3) { transform:rotate(-0.2deg); }
    .bot-card:hover { transform:translateY(-4px) rotate(0deg)!important; box-shadow:6px 10px 0 var(--shadow); }
    .bot-date    { font-family:'Courier Prime',monospace; font-size:0.68rem; color:var(--ink-faint); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
    .bot-title   { font-family:'Playfair Display',serif; font-size:1.15rem; font-weight:700; margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid var(--paper-line); }
    .bot-chars   { font-size:0.84rem; color:var(--ink-mid); margin-bottom:6px; }
    .bot-setting { font-size:0.78rem; color:var(--ink-faint); font-style:italic; line-height:1.5; }

    /* ── MODAL ── */
    .overlay { position:fixed; inset:0; background:rgba(8,6,2,0.68); display:flex; align-items:center; justify-content:center; z-index:800; padding:20px; animation:oFade 0.14s ease; }
    @keyframes oFade { from{opacity:0}to{opacity:1} }
    .mpaper { background:var(--paper); max-width:500px; width:100%; max-height:85vh; overflow-y:auto; position:relative; box-shadow:10px 14px 0 var(--shadow),0 0 0 1px var(--paper-dark); animation:mSlide 0.18s ease; }
    @keyframes mSlide { from{transform:translateY(14px);opacity:0}to{transform:none;opacity:1} }
    .mtape  { height:11px; background:var(--tape); border-bottom:1px solid rgba(160,130,30,0.2); }
    .mbody  { padding:28px 28px 24px; }
    .mtitle { font-family:'Playfair Display',serif; font-size:1.55rem; font-weight:700; margin-bottom:4px; }
    .mdate  { font-family:'Courier Prime',monospace; font-size:0.68rem; color:var(--ink-faint); letter-spacing:1px; text-transform:uppercase; margin-bottom:20px; }
    .mchar-row    { display:flex; flex-wrap:wrap; gap:5px 12px; align-items:baseline; padding:8px 0; border-bottom:1px dashed var(--paper-line); }
    .mchar-name   { font-family:'Playfair Display',serif; font-weight:600; font-size:0.95rem; }
    .mchar-meta   { font-family:'Courier Prime',monospace; font-size:0.68rem; color:var(--ink-faint); text-transform:uppercase; }
    .mchar-traits { font-family:'Courier Prime',monospace; font-size:0.68rem; color:var(--red); }
    .mpremise { font-size:0.86rem; color:var(--ink-mid); font-style:italic; line-height:1.65; padding:12px 0; margin:12px 0; border-top:1px solid var(--paper-line); border-bottom:1px solid var(--paper-line); }
    .mactions { display:flex; gap:10px; flex-wrap:wrap; }
    .mclose   { position:absolute; top:17px; right:17px; background:none; border:none; cursor:pointer; font-size:1rem; color:var(--ink-faint); }
    .mclose:hover { color:var(--ink); }
    .btn-a { font-family:'Courier Prime',monospace; font-size:0.78rem; text-transform:uppercase; letter-spacing:1px; border:1.5px solid; padding:9px 18px; cursor:pointer; background:transparent; }
    .btn-ink  { border-color:var(--ink); color:var(--ink); }
    .btn-ink:hover  { background:var(--ink); color:var(--paper); }
    .btn-red  { border-color:var(--red); color:var(--red); }
    .btn-red:hover  { background:var(--red); color:var(--paper); }
    .btn-dim  { border-color:var(--ink-faint); color:var(--ink-faint); }
    .btn-dim:hover  { border-color:var(--ink); color:var(--ink); }

    /* ── EDITOR ── */
    .editor { min-height:100vh; }
    .topbar {
      background:var(--paper); border-bottom:2.5px solid var(--ink);
      padding:10px 18px; display:flex; align-items:center; gap:10px;
      position:sticky; top:0; z-index:200;
      box-shadow:0 3px 0 var(--shadow); flex-wrap:nowrap;
    }
    .btn-back { font-family:'Courier Prime',monospace; font-size:0.76rem; background:none; border:none; cursor:pointer; color:var(--ink-mid); text-transform:uppercase; letter-spacing:1px; white-space:nowrap; flex-shrink:0; }
    .btn-back:hover { color:var(--red); }
    .title-inp { flex:1; font-family:'Playfair Display',serif; font-size:clamp(0.9rem,2vw,1.2rem); font-weight:600; background:none; border:none; border-bottom:1px dashed var(--paper-line); outline:none; color:var(--ink); min-width:60px; }
    .title-inp::placeholder { color:var(--ink-faint); font-style:italic; }
    .btn-save { font-family:'Courier Prime',monospace; font-size:0.76rem; background:var(--red); color:var(--paper); border:none; padding:9px 18px; cursor:pointer; letter-spacing:1px; text-transform:uppercase; white-space:nowrap; flex-shrink:0; }
    .btn-save:hover { background:var(--ink); }
    .btn-save.saved { background:#2c6e3a; }
    .btn-save.saving { background:var(--ink-mid); cursor:default; }

    /* autosave status pill */
    .autosave-status {
      font-family:'Courier Prime',monospace; font-size:0.62rem; text-transform:uppercase;
      letter-spacing:1px; color:var(--ink-faint); display:flex; align-items:center;
      gap:5px; white-space:nowrap; flex-shrink:0; user-select:none;
    }
    .autosave-dot {
      width:6px; height:6px; border-radius:50%; background:var(--ink-faint); flex-shrink:0;
    }
    .autosave-status.dirty .autosave-dot  { background:var(--red); animation:pulse 1.2s infinite; }
    .autosave-status.saving .autosave-dot { background:#c8a030; animation:pulse 0.7s infinite; }
    .autosave-status.saved .autosave-dot  { background:#2c6e3a; animation:none; }
    .btn-topbar-icon {
      width:34px; height:34px; flex-shrink:0;
      background:var(--paper-dark); border:1.5px solid var(--ink-faint);
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      font-size:0.95rem; color:var(--ink-mid);
    }
    .btn-topbar-icon:hover { border-color:var(--ink); color:var(--ink); }
    .btn-topbar-icon.active { background:var(--ink); color:var(--paper); border-color:var(--ink); }
    .btn-topbar-text {
      height:34px; padding:0 12px; flex-shrink:0;
      background:var(--paper-dark); border:1.5px solid var(--ink-faint);
      cursor:pointer; display:flex; align-items:center; gap:5px;
      font-family:'Courier Prime',monospace; font-size:0.7rem;
      text-transform:uppercase; letter-spacing:1px; color:var(--ink-mid); white-space:nowrap;
    }
    .btn-topbar-text:hover { border-color:var(--ink); color:var(--ink); }
    .btn-topbar-text.active { background:var(--ink); color:var(--paper); border-color:var(--ink); }
    .btn-topbar-text.ok { background:#2c6e3a; color:var(--paper); border-color:#2c6e3a; }

    /* ── Auth / User button ── */
    .auth-btn {
      font-family:'Courier Prime',monospace; font-size:0.72rem; text-transform:uppercase;
      letter-spacing:1px; background:var(--ink); color:var(--paper);
      border:none; padding:8px 14px; cursor:pointer; display:flex;
      align-items:center; gap:8px; white-space:nowrap; flex-shrink:0;
    }
    .auth-btn:hover { background:var(--red); }
    .auth-btn.signed-in { background:var(--paper-dark); color:var(--ink); border:1.5px solid var(--ink-faint); }
    .auth-btn.signed-in:hover { border-color:var(--red); color:var(--red); }
    .auth-avatar {
      width:22px; height:22px; border-radius:50%; object-fit:cover;
      border:1.5px solid var(--ink-faint); flex-shrink:0;
    }
    .auth-name { max-width:100px; overflow:hidden; text-overflow:ellipsis; }
    .auth-sync-dot {
      width:6px; height:6px; border-radius:50%; background:var(--red);
      flex-shrink:0; animation:pulse 1.4s infinite;
    }
    .auth-sync-dot.ok { background:#2c6e3a; animation:none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .file-menu-wrap { position:relative; flex-shrink:0; }
    .file-dropdown {
      position:absolute; top:calc(100% + 6px); left:0;
      background:var(--paper); border:1.5px solid var(--ink);
      box-shadow:4px 5px 0 var(--shadow);
      min-width:140px; z-index:600;
      display:flex; flex-direction:column;
      animation:oFade 0.1s ease;
    }
    .file-dropdown-item {
      font-family:'Courier Prime',monospace; font-size:0.75rem;
      text-transform:uppercase; letter-spacing:1px;
      background:none; border:none; color:var(--ink);
      padding:10px 14px; cursor:pointer; text-align:left;
      display:flex; align-items:center; gap:8px;
      border-bottom:1px dashed var(--paper-line);
    }
    .file-dropdown-item:last-child { border-bottom:none; }
    .file-dropdown-item:hover { background:var(--paper-dark); color:var(--red); }

    /* ── Import modal ── */
    .import-overlay {
      position:fixed; inset:0; background:rgba(8,6,2,0.72);
      display:flex; align-items:center; justify-content:center;
      z-index:900; padding:20px; animation:oFade 0.14s ease;
    }
    .import-modal {
      background:var(--paper); width:100%; max-width:460px;
      box-shadow:10px 14px 0 var(--shadow), 0 0 0 1px var(--paper-dark);
      animation:mSlide 0.18s ease;
    }
    .import-tape { height:10px; background:var(--tape); border-bottom:1px solid rgba(160,130,30,0.2); }
    .import-body { padding:24px 26px 22px; }
    .import-title {
      font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:700;
      margin-bottom:4px;
    }
    .import-sub {
      font-family:'Courier Prime',monospace; font-size:0.65rem;
      text-transform:uppercase; letter-spacing:1.5px; color:var(--ink-faint);
      margin-bottom:20px;
    }
    .import-drop {
      border:2px dashed var(--paper-line); padding:36px 20px;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:10px; cursor:pointer; transition:border-color 0.18s, background 0.18s;
      text-align:center; margin-bottom:16px; position:relative;
    }
    .import-drop.drag-over { border-color:var(--red); background:var(--sc-bg); }
    .import-drop-icon { font-size:2rem; color:var(--ink-faint); line-height:1; }
    .import-drop-text {
      font-family:'Courier Prime',monospace; font-size:0.72rem;
      text-transform:uppercase; letter-spacing:1px; color:var(--ink-faint);
    }
    .import-drop-hint {
      font-family:'Courier Prime',monospace; font-size:0.62rem;
      color:var(--ink-faint); opacity:0.7;
    }
    .import-file-input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; }
    .import-error {
      font-family:'Courier Prime',monospace; font-size:0.7rem; color:var(--red);
      margin-bottom:10px; padding:8px 10px; border:1px solid var(--red);
      background:rgba(139,46,26,0.06);
    }
    .import-actions { display:flex; gap:10px; justify-content:flex-end; }
    .import-close {
      position:absolute; top:14px; right:14px;
      background:none; border:none; cursor:pointer; font-size:1rem;
      color:var(--ink-faint);
    }
    .import-close:hover { color:var(--ink); }

    .ebody-wrap { transition: padding 0.32s cubic-bezier(0.4,0,0.2,1); }
    .ebody { max-width:800px; margin:0 auto; padding:36px 24px 140px; }
    .esec  { margin-bottom:44px; }
    .estitle { font-family:'Playfair Display',serif; font-size:1.35rem; font-weight:700; border-bottom:2px solid var(--ink); padding-bottom:9px; margin-bottom:20px; display:flex; align-items:baseline; justify-content:space-between; }
    .escount { font-family:'Courier Prime',monospace; font-size:0.68rem; color:var(--ink-faint); text-transform:uppercase; letter-spacing:1px; }
    .esub { font-family:'Courier Prime',monospace; font-size:0.67rem; text-transform:uppercase; letter-spacing:2px; color:var(--red); margin:18px 0 10px; }

    /* ── Character panel ── */
    .cpanel { background:var(--paper); border:1px solid var(--paper-dark); margin-bottom:18px; box-shadow:3px 4px 0 var(--shadow); }
    .cheader { display:flex; align-items:center; gap:10px; padding:13px 16px; cursor:pointer; user-select:none; }
    .clabel  { font-family:'Playfair Display',serif; font-size:1rem; font-weight:600; flex:1; pointer-events:none; }
    .gblocK { display:flex; align-items:center; gap:6px; font-family:'Courier Prime',monospace; font-size:0.7rem; color:var(--ink-faint); }
    .glbl { }
    .glbl.on { color:var(--red); font-weight:bold; }
    .gtog { position:relative; display:inline-block; width:42px; height:20px; }
    .gtog input { opacity:0; width:0; height:0; }
    .gslider { position:absolute; inset:0; cursor:pointer; background:var(--paper-dark); border:1.5px solid var(--ink-faint); }
    .gslider::before { content:''; position:absolute; height:12px; width:12px; left:2px; bottom:2px; background:var(--ink-faint); }
    .gtog input:checked + .gslider { border-color:var(--red); }
    .gtog input:checked + .gslider::before { transform:translateX(22px); background:var(--red); }
    .ciconbtn { background:none; border:none; cursor:pointer; font-size:0.85rem; color:var(--ink-faint); padding:2px 5px; line-height:1; }
    .ciconbtn:hover { color:var(--red); }
    .cbody { padding:18px 18px 12px; }

    /* ── Fields ── */
    .frow { display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:14px 18px; margin-bottom:14px; }
    .ffd  { display:flex; flex-direction:column; gap:4px; }
    .flbl { font-family:'Courier Prime',monospace; font-size:0.66rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--ink-faint); }
    .finp { font-family:'Lora',serif; font-size:0.9rem; background:none; border:none; border-bottom:1px solid var(--paper-line); outline:none; padding:5px 0; color:var(--ink); }
    .finp:focus { border-bottom-color:var(--ink-mid); }
    .finp::placeholder { color:var(--ink-faint); font-style:italic; }
    .fta  { font-family:'Lora',serif; font-size:0.87rem; background:none; border:1px solid var(--paper-line); outline:none; padding:9px 10px; color:var(--ink); resize:vertical; min-height:70px; width:100%; line-height:1.65; }
    .fta:focus { border-color:var(--ink-mid); }
    .fta::placeholder { color:var(--ink-faint); font-style:italic; }

    /* ── Personality ── */
    .tsel { font-family:'Courier Prime',monospace; font-size:0.68rem; color:var(--red); letter-spacing:0.5px; margin-bottom:8px; min-height:18px; }
    .tgrid { display:flex; flex-wrap:wrap; gap:5px; }
    .tchip { font-family:'Courier Prime',monospace; font-size:0.68rem; text-transform:uppercase; letter-spacing:0.3px; padding:4px 8px; border:1px solid var(--paper-line); cursor:pointer; background:none; color:var(--ink-mid); user-select:none; }
    .tchip:hover { border-color:var(--ink-mid); color:var(--ink); }
    .tchip.on { background:var(--ink); color:var(--paper); border-color:var(--ink); }
    .tchip.on:hover { background:var(--red); border-color:var(--red); }

    /* ── Backstory ── */
    .bslist { display:flex; flex-direction:column; gap:5px; }
    .bsitem { display:flex; align-items:flex-start; gap:7px; padding:7px 9px; background:var(--paper-dark); border:1px solid transparent; }
    .bsitem.dragov { border-top:2px solid var(--red); }
    .bsdrag { cursor:grab; color:var(--ink-faint); font-size:1rem; padding-top:2px; user-select:none; flex-shrink:0; line-height:1; }
    .bsdrag:active { cursor:grabbing; }
    .bsta  { flex:1; font-family:'Lora',serif; font-size:0.86rem; background:none; border:none; outline:none; color:var(--ink); resize:none; overflow:hidden; min-height:1.55em; line-height:1.55; display:block; }
    .bsta::placeholder { color:var(--ink-faint); font-style:italic; }
    .bsrm  { background:none; border:none; cursor:pointer; color:var(--ink-faint); font-size:0.75rem; flex-shrink:0; padding:2px; }
    .bsrm:hover { color:var(--red); }
    .gadd  { font-family:'Courier Prime',monospace; font-size:0.7rem; text-transform:uppercase; letter-spacing:1px; background:none; border:1px dashed var(--ink-faint); color:var(--ink-faint); padding:7px 14px; cursor:pointer; margin-top:7px; display:inline-block; }
    .gadd:hover { border-color:var(--ink); color:var(--ink); }
    .addchar { width:100%; font-family:'Courier Prime',monospace; font-size:0.78rem; text-transform:uppercase; letter-spacing:1.5px; background:none; border:2px dashed var(--ink-faint); color:var(--ink-faint); padding:15px; cursor:pointer; margin-bottom:30px; }
    .addchar:hover { border-color:var(--ink); color:var(--ink); }

    /* ── Scenario ── */
    .sc-wrap { background:var(--sc-bg); border:1.5px solid var(--sc-border); border-left:4px solid var(--red); padding:22px 20px 18px; }
    .sc-wrap .finp { border-bottom-color:var(--sc-border); }
    .sc-wrap .finp:focus { border-bottom-color:var(--red); }
    .sc-wrap .fta  { border-color:var(--sc-border); background:var(--paper); }
    .sc-wrap .fta:focus { border-color:var(--red); }
    .scgrid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
    @media (max-width:520px) { .scgrid { grid-template-columns:1fr; } }
    .scf    { display:flex; flex-direction:column; gap:5px; }
    .scf.sp { grid-column:1/-1; }
    .scsub  { grid-column:1/-1; font-family:'Courier Prime',monospace; font-size:0.65rem; text-transform:uppercase; letter-spacing:2px; color:var(--red); padding-top:8px; border-top:1px dashed var(--sc-border); margin-top:6px; }

    /* ── Rules ── */
    .rlist { display:flex; flex-direction:column; gap:4px; }
    .rrow  { display:flex; gap:8px; align-items:flex-start; padding:7px 0; border-bottom:1px dashed var(--paper-line); }
    .rnum  { font-family:'Courier Prime',monospace; font-size:0.73rem; color:var(--red); flex-shrink:0; min-width:22px; padding-top:2px; }
    .rinp  { flex:1; font-family:'Lora',serif; font-size:0.84rem; background:none; border:none; outline:none; color:var(--ink); resize:none; line-height:1.55; }
    .rrm   { background:none; border:none; cursor:pointer; color:var(--ink-faint); font-size:0.72rem; flex-shrink:0; }
    .rrm:hover { color:var(--red); }

    /* ════════════════════════════════
       LEFT PANEL — API Settings
    ════════════════════════════════ */
    .panel-backdrop {
      display:none;
    }
    .left-panel {
      position:fixed; top:var(--topbar-h,57px); left:0; height:calc(100vh - var(--topbar-h,57px)); width:330px;
      background:var(--panel-bg); border-right:2px solid var(--paper-line);
      z-index:150; display:flex; flex-direction:column;
      transform:translateX(-100%);
      box-shadow:4px 0 24px var(--shadow);
      transition: transform 0.32s cubic-bezier(0.4,0,0.2,1), background-color 0.4s ease, border-color 0.4s ease;
    }
    .left-panel.open { transform:translateX(0); }

    .lp-head {
      background:var(--ink); color:var(--paper);
      padding:15px 18px; display:flex; align-items:center; justify-content:space-between;
      flex-shrink:0; border-bottom:1px solid var(--paper-line);
    }
    .lp-head h2 { font-family:'Playfair Display',serif; font-size:1.05rem; font-weight:700; }
    .lp-x { background:none; border:none; color:var(--paper); cursor:pointer; font-size:1rem; padding:3px 6px; line-height:1; }
    .lp-x:hover { color:#f0b8c8; }
    .lp-body { flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:16px; }

    .lp-sec { display:flex; flex-direction:column; gap:8px; }
    .lp-lbl { font-family:'Courier Prime',monospace; font-size:0.62rem; text-transform:uppercase; letter-spacing:2px; color:var(--red); }
    .lp-inp {
      font-family:'Courier Prime',monospace; font-size:0.82rem;
      background:var(--paper); border:1px solid var(--paper-line);
      color:var(--ink); padding:8px 10px; outline:none; width:100%;
    }
    .lp-inp:focus { border-color:var(--ink-mid); }
    .lp-inp::placeholder { color:var(--ink-faint); }
    .lp-hr { border:none; border-top:1px dashed var(--paper-line); }
    .lp-hint { font-family:'Courier Prime',monospace; font-size:0.61rem; color:var(--ink-faint); line-height:1.6; }

    .lp-row { display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .lp-btn {
      font-family:'Courier Prime',monospace; font-size:0.65rem; text-transform:uppercase;
      letter-spacing:1px; background:var(--ink); color:var(--paper);
      border:none; padding:7px 12px; cursor:pointer; white-space:nowrap; flex-shrink:0;
    }
    .lp-btn:hover { background:var(--red); }
    .lp-btn:disabled { opacity:0.45; cursor:default; }

    .model-list { display:flex; flex-direction:column; gap:3px; max-height:300px; overflow-y:auto; }
    .model-item {
      padding:8px 10px; background:var(--paper); border:1px solid var(--paper-line);
      cursor:pointer; display:flex; flex-direction:column; gap:2px;
    }
    .model-item:hover { border-color:var(--ink-mid); }
    .model-item.sel { border-color:var(--red); background:var(--sc-bg); }
    .model-n { font-family:'Courier Prime',monospace; font-size:0.73rem; color:var(--ink); word-break:break-all; }
    .model-p { font-family:'Courier Prime',monospace; font-size:0.62rem; color:var(--ink-faint); }
    .model-note { font-family:'Courier Prime',monospace; font-size:0.68rem; color:var(--ink-faint); text-align:center; padding:14px 8px; }

    .sel-pill {
      font-family:'Courier Prime',monospace; font-size:0.7rem;
      color:var(--red); padding:5px 0; word-break:break-all; line-height:1.5;
    }

    /* ════════════════════════════════
       RIGHT PANEL — Chat
    ════════════════════════════════ */
    .right-panel {
      position:fixed; top:var(--topbar-h,57px); right:0; height:calc(100vh - var(--topbar-h,57px)); width:370px;
      background:var(--panel-bg); border-left:2px solid var(--paper-line);
      z-index:150; display:flex; flex-direction:column;
      transform:translateX(100%);
      box-shadow:-4px 0 24px var(--shadow);
      transition: transform 0.32s cubic-bezier(0.4,0,0.2,1), background-color 0.4s ease, border-color 0.4s ease;
    }
    .right-panel.open { transform:translateX(0); }
    .right-panel.fullscreen {
      width:100vw !important; height:calc(100vh - var(--topbar-h,57px)); top:var(--topbar-h,57px); right:0;
      border-left:none;
    }

    /* drag handle on left edge of panel */
    .rp-resize-handle {
      position:absolute; left:0; top:0; width:5px; height:100%;
      cursor:ew-resize; z-index:10; background:transparent;
      transition: background 0.2s;
      user-select:none;
    }
    .rp-resize-handle:hover,
    .rp-resize-handle.dragging {
      background: var(--red);
      opacity:0.5;
    }
    .right-panel.fullscreen .rp-resize-handle { display:none; }

    /* fullscreen button in header */
    .rp-fullscreen-btn {
      background:none; border:none; color:var(--paper); cursor:pointer;
      font-size:0.85rem; padding:3px 6px; line-height:1; flex-shrink:0;
      opacity:0.75;
    }
    .rp-fullscreen-btn:hover { opacity:1; color:#f0f0d0; }

    .rp-head {
      background:var(--ink); color:var(--paper);
      padding:12px 16px; display:flex; align-items:center; gap:10px;
      flex-shrink:0; border-bottom:1px solid var(--paper-line);
    }
    .rp-head h2 { font-family:'Playfair Display',serif; font-size:0.98rem; font-weight:700; flex:1; }
    .rp-badge {
      font-family:'Courier Prime',monospace; font-size:0.58rem; text-transform:uppercase;
      letter-spacing:1px; padding:3px 7px; border:1px solid; white-space:nowrap; flex-shrink:0;
    }
    .rp-badge.on  { color:var(--red); border-color:var(--red); }
    .rp-badge.off { color:var(--ink-faint); border-color:var(--ink-faint); }
    .rp-x { background:none; border:none; color:var(--paper); cursor:pointer; font-size:1rem; padding:3px 6px; line-height:1; flex-shrink:0; }
    .rp-x:hover { color:#f0b8c8; }

    .chat-msgs { flex:1; overflow-y:auto; padding:12px 12px 6px; display:flex; flex-direction:column; gap:10px; }
    .chat-empty { margin:auto; text-align:center; padding:30px 16px; }
    .chat-empty-t { font-family:'Playfair Display',serif; font-size:1rem; font-style:italic; color:var(--ink-faint); margin-bottom:8px; }
    .chat-empty-s { font-family:'Courier Prime',monospace; font-size:0.62rem; text-transform:uppercase; letter-spacing:1px; color:var(--ink-faint); line-height:1.7; }

    .chat-msg { display:flex; flex-direction:column; gap:2px; max-width:90%; }
    .chat-msg.user { align-self:flex-end; }
    .chat-msg.assistant { align-self:flex-start; }
    .chat-role-lbl { font-family:'Courier Prime',monospace; font-size:0.58rem; text-transform:uppercase; letter-spacing:1px; color:var(--ink-faint); padding:0 2px; }
    .chat-bubble { padding:9px 12px; font-family:'Lora',serif; font-size:0.82rem; line-height:1.6; border:1px solid var(--paper-line); word-break:break-word; white-space:pre-wrap; }
    .chat-msg.user      .chat-bubble { background:var(--chat-user); }
    .chat-msg.assistant .chat-bubble { background:var(--chat-ai); border-left:3px solid var(--red); }
    .chat-thinking { font-family:'Courier Prime',monospace; font-size:0.7rem; color:var(--ink-faint); font-style:italic; align-self:flex-start; padding:4px 2px; }

    /* ── Thinking box ── */
    .think-box {
      background: var(--paper-dark);
      border: 1px dashed var(--paper-line);
      border-left: 3px solid var(--ink-faint);
      padding: 0;
      font-family: 'Courier Prime', monospace;
      font-size: 0.72rem;
      color: var(--ink-faint);
      margin-bottom: 4px;
      max-width: 100%;
    }
    .think-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 9px; cursor: pointer; user-select: none;
      gap: 6px;
    }
    .think-header:hover { color: var(--ink-mid); }
    .think-label { text-transform: uppercase; letter-spacing: 1.5px; font-size: 0.62rem; }
    .think-chevron { font-size: 0.65rem; flex-shrink: 0; }
    .think-body {
      padding: 8px 10px 9px;
      border-top: 1px dashed var(--paper-line);
      white-space: pre-wrap; word-break: break-word;
      line-height: 1.6; font-style: italic;
      max-height: 260px; overflow-y: auto;
    }
    .think-toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 2px 0 6px;
    }
    .think-toggle-lbl {
      font-family: 'Courier Prime', monospace; font-size: 0.62rem;
      text-transform: uppercase; letter-spacing: 1.5px; color: var(--ink-faint);
    }
    .think-tog { position:relative; display:inline-block; width:36px; height:18px; flex-shrink:0; }
    .think-tog input { opacity:0; width:0; height:0; }
    .think-tslider { position:absolute; inset:0; cursor:pointer; background:var(--paper-dark); border:1.5px solid var(--ink-faint); }
    .think-tslider::before { content:''; position:absolute; height:10px; width:10px; left:2px; bottom:2px; background:var(--ink-faint); transition:transform 0.2s, background 0.2s; }
    .think-tog input:checked + .think-tslider { border-color:var(--red); }
    .think-tog input:checked + .think-tslider::before { transform:translateX(18px); background:var(--red); }

    .chat-foot { padding:10px 12px; border-top:1px solid var(--paper-line); display:flex; flex-direction:column; gap:7px; flex-shrink:0; }
    .chat-model-row { display:flex; align-items:center; justify-content:space-between; }
    .chat-model-lbl { font-family:'Courier Prime',monospace; font-size:0.62rem; color:var(--ink-faint); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:200px; }
    .chat-model-lbl span { color:var(--red); }
    .chat-clear-btn { font-family:'Courier Prime',monospace; font-size:0.61rem; text-transform:uppercase; letter-spacing:1px; background:none; border:none; color:var(--ink-faint); cursor:pointer; padding:0; flex-shrink:0; }
    .chat-clear-btn:hover { color:var(--red); }
    .chat-input-row { display:flex; gap:7px; align-items:flex-end; }
    .chat-ta { flex:1; font-family:'Lora',serif; font-size:0.84rem; background:var(--paper); border:1px solid var(--paper-line); color:var(--ink); padding:8px 10px; outline:none; resize:none; min-height:56px; max-height:130px; line-height:1.5; }
    .chat-ta:focus { border-color:var(--ink-mid); }
    .chat-ta::placeholder { color:var(--ink-faint); font-style:italic; }
    .chat-send { background:var(--red); color:var(--paper); border:none; cursor:pointer; padding:10px 13px; font-size:1rem; align-self:flex-end; flex-shrink:0; }
    .chat-send:hover { background:var(--ink); }
    .chat-send:disabled { opacity:0.38; cursor:default; }

    .no-api-msg { flex:1; display:flex; align-items:center; justify-content:center; padding:24px; }
    .no-api-msg p { font-family:'Courier Prime',monospace; font-size:0.7rem; color:var(--ink-faint); text-align:center; line-height:1.8; text-transform:uppercase; letter-spacing:1px; }

    @media (max-width:640px) {
      .left-panel  { width:100vw; }
      .right-panel { width:100vw; }
      .fab-cluster { bottom:18px; right:14px; }
      .fab-copy { padding:12px 18px; font-size:0.8rem; }
    }
    /* ── Settings controls ── */
    .lp-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .lp-field { display:flex; flex-direction:column; gap:4px; }
    .lp-num {
      font-family:'Courier Prime',monospace; font-size:0.82rem;
      background:var(--paper); border:1px solid var(--paper-line);
      color:var(--ink); padding:6px 8px; outline:none; width:100%;
    }
    .lp-num:focus { border-color:var(--ink-mid); }
    .lp-ta {
      font-family:'Lora',serif; font-size:0.8rem;
      background:var(--paper); border:1px solid var(--paper-line);
      color:var(--ink); padding:8px 10px; outline:none; width:100%;
      resize:vertical; min-height:72px; line-height:1.55;
    }
    .lp-ta:focus { border-color:var(--ink-mid); }
    .lp-ta::placeholder { color:var(--ink-faint); font-style:italic; }
    .lp-toggle-row { display:flex; align-items:center; justify-content:space-between; }
    .lp-toggle-lbl { font-family:'Courier Prime',monospace; font-size:0.7rem; color:var(--ink-mid); text-transform:uppercase; letter-spacing:1px; }
    .lp-tog { position:relative; display:inline-block; width:42px; height:20px; flex-shrink:0; }
    .lp-tog input { opacity:0; width:0; height:0; }
    .lp-tslider { position:absolute; inset:0; cursor:pointer; background:var(--paper-dark); border:1.5px solid var(--ink-faint); }
    .lp-tslider::before { content:''; position:absolute; height:12px; width:12px; left:2px; bottom:2px; background:var(--ink-faint); transition:transform 0.2s, background 0.2s; }
    .lp-tog input:checked + .lp-tslider { border-color:var(--red); }
    .lp-tog input:checked + .lp-tslider::before { transform:translateX(22px); background:var(--red); }
    .adv-toggle {
      font-family:'Courier Prime',monospace; font-size:0.65rem; text-transform:uppercase;
      letter-spacing:1.5px; background:none; border:none; color:var(--ink-faint);
      cursor:pointer; padding:0; display:flex; align-items:center; gap:6px;
    }
    .adv-toggle:hover { color:var(--ink); }
    .adv-body { display:flex; flex-direction:column; gap:10px; margin-top:10px; }
    .guide-loaded { display:flex; align-items:center; justify-content:space-between; gap:8px; background:var(--paper); border:1px solid var(--paper-line); padding:7px 10px; }
    .guide-name { font-family:'Courier Prime',monospace; font-size:0.7rem; color:var(--red); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .guide-clear { background:none; border:none; cursor:pointer; color:var(--ink-faint); font-size:0.72rem; flex-shrink:0; font-family:'Courier Prime',monospace; }
    .guide-clear:hover { color:var(--red); }
    .guide-upload-btn {
      font-family:'Courier Prime',monospace; font-size:0.7rem; text-transform:uppercase;
      letter-spacing:1px; background:none; border:1px dashed var(--ink-faint);
      color:var(--ink-faint); padding:8px 12px; cursor:pointer; display:inline-block; width:100%; text-align:center;
    }
    .guide-upload-btn:hover { border-color:var(--ink); color:var(--ink); }

    /* ── Dynamics Editor ── */
    .dyn-list { display:flex; flex-direction:column; gap:14px; margin-bottom:8px; }
    .dyn-entry { background:var(--paper); border:1px solid var(--paper-line); padding:10px 12px 10px; }
    .dyn-pair { display:flex; align-items:center; gap:8px; margin-bottom:9px; flex-wrap:wrap; }
    .dyn-sel {
      font-family:'Courier Prime',monospace; font-size:0.72rem;
      background:var(--paper-dark); border:1px solid var(--paper-line);
      color:var(--ink); padding:5px 8px; outline:none; cursor:pointer;
      text-transform:uppercase; letter-spacing:0.5px; flex:1; min-width:90px; max-width:160px;
    }
    .dyn-sel:focus { border-color:var(--ink-mid); }
    .dyn-arrow { color:var(--red); font-size:1rem; flex-shrink:0; user-select:none; }
    .dyn-rm { background:none; border:none; cursor:pointer; color:var(--ink-faint); font-size:0.75rem; padding:2px 5px; margin-left:auto; flex-shrink:0; }
    .dyn-rm:hover { color:var(--red); }


    .saved-toast {
      position: fixed;
      right: 0;
      top: calc(var(--topbar-h, 57px) + 10px);
      z-index: 1000;
      background: var(--ink);
      color: var(--paper);
      padding: 12px 28px 12px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: -5px 4px 28px var(--shadow);
      border-left: 3px solid var(--red);
      animation: toastSlide 3.2s cubic-bezier(0.4,0,0.2,1) forwards;
      pointer-events: none;
    }
    .saved-ink {
      font-family: 'Courier Prime', monospace;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--ink-faint);
      opacity: 0;
      animation: fadeLabel 0.3s 0.5s forwards;
    }
    .saved-text {
      font-family: 'Dancing Script', cursive;
      font-size: 1.65rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      clip-path: inset(0 100% 0 0);
      animation: writeReveal 0.75s 0.45s cubic-bezier(0.22,1,0.36,1) forwards;
      line-height: 1;
    }
    @keyframes toastSlide {
      0%   { transform: translateX(110%); }
      14%  { transform: translateX(0%);   }
      78%  { transform: translateX(0%);   }
      100% { transform: translateX(110%); }
    }
    @keyframes writeReveal {
      from { clip-path: inset(0 100% 0 0); }
      to   { clip-path: inset(0 0%   0 0); }
    }
    @keyframes fadeLabel {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Chat message action bar ── */
    .chat-msg-wrap { display:flex; flex-direction:column; gap:3px; }
    .chat-msg-wrap.user  { align-self:flex-end; max-width:90%; }
    .chat-msg-wrap.assistant { align-self:flex-start; width:95%; }
    .chat-msg-actions {
      display:flex; align-items:center; gap:4px; padding:2px 2px 0;
      opacity:0; transition:opacity 0.15s;
    }
    .chat-msg-wrap:hover .chat-msg-actions { opacity:1; }
    .msg-act-btn {
      font-family:'Courier Prime',monospace; font-size:0.6rem; text-transform:uppercase;
      letter-spacing:0.5px; background:none; border:1px solid transparent;
      color:var(--ink-faint); padding:3px 7px; cursor:pointer; white-space:nowrap;
    }
    .msg-act-btn:hover { border-color:var(--paper-line); color:var(--ink); }
    .msg-act-btn.danger:hover { color:var(--red); border-color:var(--red); }
    .msg-act-btn.ok { color:#2c6e3a; border-color:#2c6e3a; }
    .msg-drag-hint {
      margin-left:auto; font-family:'Courier Prime',monospace; font-size:0.55rem;
      color:var(--ink-faint); letter-spacing:0.5px; cursor:grab; user-select:none;
      display:flex; align-items:center; gap:3px; padding:3px 5px;
    }
    .msg-drag-hint:hover { color:var(--red); }
    .chat-msg-wrap.assistant .chat-bubble { cursor:grab; }
    .chat-msg-wrap.assistant .chat-bubble:active { cursor:grabbing; }
    .chat-bubble.is-dragging { opacity:0.4; border-style:dashed; }
    .chat-stop-btn {
      font-family:'Courier Prime',monospace; font-size:0.65rem; text-transform:uppercase;
      letter-spacing:1px; background:none; border:1.5px solid var(--red); color:var(--red);
      padding:5px 14px; cursor:pointer; align-self:flex-start; margin:4px 0;
    }
    .chat-stop-btn:hover { background:var(--red); color:var(--paper); }
    .chat-stop-inline {
      background: var(--red) !important;
      font-size: 1.1rem !important;
      letter-spacing: 0 !important;
    }
    .chat-stop-inline:hover { background: #6b1e0e !important; }

    /* ── Drop-to-sheet overlay ── */
    .ebody-wrap { position:relative; }
    .drop-zone-overlay {
      position:absolute; inset:0; z-index:90; pointer-events:none;
      background:rgba(139,46,26,0.06); border:2.5px dashed var(--red);
      display:flex; align-items:center; justify-content:center;
      opacity:0; transition:opacity 0.15s;
    }
    .drop-zone-overlay.active { opacity:1; pointer-events:all; }
    .drop-zone-label {
      font-family:'Courier Prime',monospace; font-size:0.82rem; text-transform:uppercase;
      letter-spacing:2px; color:var(--red); background:var(--paper);
      padding:10px 24px; border:2px solid var(--red); pointer-events:none;
    }

    /* ── Insert Modal ── */
    .insert-overlay {
      position:fixed; inset:0; z-index:900; background:rgba(8,6,2,0.6);
      display:flex; align-items:center; justify-content:center;
      padding:20px; animation:oFade 0.12s ease;
    }
    .insert-modal {
      background:var(--paper); max-width:540px; width:100%;
      box-shadow:10px 14px 0 var(--shadow),0 0 0 1px var(--paper-dark);
      animation:mSlide 0.16s ease; display:flex; flex-direction:column; max-height:88vh;
    }
    .insert-tape { height:10px; background:var(--tape); border-bottom:1px solid rgba(160,130,30,0.2); flex-shrink:0; }
    .insert-head {
      background:var(--ink); color:var(--paper); padding:13px 18px;
      display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
    }
    .insert-head h3 { font-family:'Playfair Display',serif; font-size:1rem; font-weight:700; }
    .insert-x { background:none; border:none; color:var(--paper); cursor:pointer; font-size:0.9rem; padding:2px 6px; }
    .insert-x:hover { color:#f0b8c8; }
    .insert-body { padding:20px 22px 18px; overflow-y:auto; display:flex; flex-direction:column; gap:16px; }
    .insert-preview {
      font-family:'Lora',serif; font-size:0.78rem; color:var(--ink-mid); font-style:italic;
      border-left:3px solid var(--red); padding:8px 12px; background:var(--chat-ai);
      max-height:90px; overflow-y:auto; line-height:1.55;
    }
    .insert-sub { font-family:'Courier Prime',monospace; font-size:0.6rem; text-transform:uppercase; letter-spacing:2px; color:var(--red); margin-bottom:6px; }
    .insert-cat-btn {
      font-family:'Courier Prime',monospace; font-size:0.72rem; text-transform:uppercase;
      letter-spacing:0.5px; background:var(--paper-dark); border:1.5px solid var(--paper-line);
      color:var(--ink-mid); padding:14px 10px; cursor:pointer;
      display:flex; flex-direction:column; align-items:center; text-align:center; gap:2px;
    }
    .insert-cat-btn:hover { border-color:var(--ink); color:var(--ink); }
    .insert-cat-hint { font-size:0.56rem; text-transform:none; letter-spacing:0; color:var(--ink-faint); margin-top:3px; line-height:1.4; }
    .insert-char-row { display:flex; gap:6px; flex-wrap:wrap; }
    .insert-char-btn {
      font-family:'Courier Prime',monospace; font-size:0.7rem; text-transform:uppercase;
      background:var(--paper-dark); border:1.5px solid var(--paper-line); color:var(--ink-mid);
      padding:5px 10px; cursor:pointer;
    }
    .insert-char-btn.sel { background:var(--ink); color:var(--paper); border-color:var(--ink); }
    .insert-field-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }
    .insert-field-btn {
      font-family:'Courier Prime',monospace; font-size:0.62rem; text-transform:uppercase;
      letter-spacing:0.5px; background:var(--paper-dark); border:1.5px solid var(--paper-line);
      color:var(--ink-mid); padding:10px 6px; cursor:pointer;
      display:flex; flex-direction:column; gap:4px; align-items:center; text-align:center;
    }
    .insert-field-btn:hover { border-color:var(--ink-mid); color:var(--ink); }
    .insert-field-icon { font-size:1.1rem; line-height:1; }
    .insert-ai-row { display:flex; gap:8px; }
    .insert-ai-btn {
      flex:1; font-family:'Courier Prime',monospace; font-size:0.7rem; text-transform:uppercase;
      letter-spacing:1px; background:none; border:1.5px solid var(--red); color:var(--red);
      padding:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
    }
    .insert-ai-btn:hover { background:var(--red); color:var(--paper); }
    .insert-loading { font-family:'Courier Prime',monospace; font-size:0.7rem; text-transform:uppercase; letter-spacing:1px; color:var(--ink-faint); text-align:center; padding:24px 0; }
    .insert-result-lbl { font-family:'Courier Prime',monospace; font-size:0.6rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--red); margin-bottom:5px; }
    .insert-result-box {
      font-family:'Lora',serif; font-size:0.82rem; color:var(--ink);
      border:1px solid var(--paper-line); padding:12px; background:var(--sc-bg);
      max-height:150px; overflow-y:auto; white-space:pre-wrap; line-height:1.6;
    }
    .insert-actions { display:flex; gap:8px; flex-wrap:wrap; }
    .insert-confirm { font-family:'Courier Prime',monospace; font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; background:var(--ink); color:var(--paper); border:none; padding:10px 22px; cursor:pointer; }
    .insert-confirm:hover { background:var(--red); }
    .insert-back { font-family:'Courier Prime',monospace; font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; background:none; border:1.5px solid var(--ink-faint); color:var(--ink-faint); padding:10px 16px; cursor:pointer; }
    .insert-back:hover { border-color:var(--ink); color:var(--ink); }
    .insert-error { font-family:'Courier Prime',monospace; font-size:0.7rem; color:var(--red); }

    /* shorten backstory */
    .bs-header-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
    .bs-shorten-btn {
      font-family:'Courier Prime',monospace; font-size:0.58rem; text-transform:uppercase;
      letter-spacing:1px; background:none; border:1px dashed var(--ink-faint); color:var(--ink-faint);
      padding:3px 8px; cursor:pointer;
    }
    .bs-shorten-btn:hover { border-color:var(--red); color:var(--red); }
    .bs-shorten-btn:disabled { opacity:0.4; cursor:default; }

    /* ── Token count badge ── */
    .token-badge {
      font-family:'Courier Prime',monospace; font-size:0.58rem; text-transform:uppercase;
      letter-spacing:1px; color:var(--ink-faint); background:var(--paper-dark);
      border:1px solid var(--paper-line); padding:2px 7px; white-space:nowrap;
      user-select:none; flex-shrink:0;
    }
    .token-badge.warn  { color:#b87c20; border-color:#b87c20; }
    .token-badge.over  { color:var(--red); border-color:var(--red); }
    .total-token-pill {
      font-family:'Courier Prime',monospace; font-size:0.62rem; text-transform:uppercase;
      letter-spacing:1px; color:var(--ink-faint); white-space:nowrap; flex-shrink:0;
      display:flex; align-items:center; gap:4px;
    }
    .total-token-pill.warn { color:#b87c20; }
    .total-token-pill.over { color:var(--red); }


    /* ── First Messages ── */
    .fm-wrap { display:flex; flex-direction:column; gap:8px; }
    .fm-topbar { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .fm-nav-btn {
      width:28px; height:28px; flex-shrink:0;
      background:var(--paper-dark); border:1.5px solid var(--paper-line);
      color:var(--ink-mid); cursor:pointer; display:flex; align-items:center;
      justify-content:center; font-size:0.85rem;
    }
    .fm-nav-btn:hover:not(:disabled) { border-color:var(--ink); color:var(--ink); }
    .fm-nav-btn:disabled { opacity:0.3; cursor:default; }
    .fm-counter {
      font-family:'Courier Prime',monospace; font-size:0.65rem; color:var(--ink-faint);
      text-transform:uppercase; letter-spacing:1px; white-space:nowrap; padding:0 2px;
    }
    .fm-actions { display:flex; gap:5px; margin-left:auto; }
    .fm-btn {
      font-family:'Courier Prime',monospace; font-size:0.6rem; text-transform:uppercase;
      letter-spacing:1px; background:none; border:1px solid var(--paper-line);
      color:var(--ink-faint); padding:4px 9px; cursor:pointer; white-space:nowrap;
    }
    .fm-btn:hover      { border-color:var(--ink-mid); color:var(--ink); }
    .fm-btn.ok         { color:#2c6e3a; border-color:#2c6e3a; }
    .fm-btn.danger:hover { border-color:var(--red); color:var(--red); }
    .fm-ta {
      width:100%; font-family:'Lora',serif; font-size:0.84rem; color:var(--ink);
      background:var(--paper-dark); border:1px solid var(--paper-line);
      padding:10px 12px; outline:none; resize:none; line-height:1.65; min-height:110px;
    }
    .fm-ta:focus { border-color:var(--ink-mid); }
    .fm-ta::placeholder { color:var(--ink-faint); font-style:italic; font-size:0.78rem; }

    .sp-section { display:flex; flex-direction:column; gap:10px; }
    .sp-mode-row { display:flex; gap:0; border:1.5px solid var(--paper-line); overflow:hidden; align-self:flex-start; }
    .sp-mode-btn {
      font-family:'Courier Prime',monospace; font-size:0.65rem; text-transform:uppercase;
      letter-spacing:1px; background:var(--paper-dark); border:none; color:var(--ink-faint);
      padding:7px 14px; cursor:pointer; white-space:nowrap;
      border-right:1px solid var(--paper-line);
    }
    .sp-mode-btn:last-child { border-right:none; }
    .sp-mode-btn.active { background:var(--ink); color:var(--paper); }
    .sp-mode-btn:hover:not(.active) { color:var(--ink); background:var(--paper); }

    /* preset picker */
    .sp-preset-grid {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:6px;
    }
    .sp-preset-btn {
      font-family:'Courier Prime',monospace; font-size:0.62rem; text-transform:uppercase;
      letter-spacing:0.5px; background:var(--paper-dark); border:1.5px solid var(--paper-line);
      color:var(--ink-mid); padding:8px 10px; cursor:pointer; text-align:left;
      line-height:1.3;
    }
    .sp-preset-btn:hover { border-color:var(--ink-mid); color:var(--ink); }
    .sp-preset-btn.sel { background:var(--ink); color:var(--paper); border-color:var(--ink); }
    .sp-preset-name { display:block; font-size:0.65rem; }
    .sp-preset-tag  { display:block; font-size:0.55rem; color:var(--ink-faint); margin-top:2px; text-transform:none; letter-spacing:0; }
    .sp-preset-btn.sel .sp-preset-tag { color:rgba(255,255,255,0.55); }

    /* line picker (after preset selected) */
    .sp-lines-area { display:flex; flex-direction:column; gap:6px; }
    .sp-lines-header {
      font-family:'Courier Prime',monospace; font-size:0.6rem; text-transform:uppercase;
      letter-spacing:1.5px; color:var(--red); display:flex; align-items:center; gap:8px;
    }
    .sp-lines-header span { color:var(--ink-faint); font-size:0.58rem; text-transform:none; letter-spacing:0; }
    .sp-line-row {
      display:flex; align-items:flex-start; gap:8px; padding:8px 10px;
      background:var(--sc-bg); border:1px solid var(--paper-line); cursor:pointer;
    }
    .sp-line-row:hover { border-color:var(--ink-mid); }
    .sp-line-row.sel { border-color:var(--red); background:var(--chat-ai); }
    .sp-line-check {
      width:14px; height:14px; border:1.5px solid var(--paper-line); flex-shrink:0; margin-top:2px;
      display:flex; align-items:center; justify-content:center; font-size:0.6rem;
    }
    .sp-line-row.sel .sp-line-check { background:var(--red); border-color:var(--red); color:var(--paper); }
    .sp-line-text { font-family:'Lora',serif; font-size:0.8rem; font-style:italic; color:var(--ink); line-height:1.5; }
    .sp-line-row:not(.sel) .sp-line-text { color:var(--ink-mid); }

    /* selected lines display */
    .sp-selected-list { display:flex; flex-direction:column; gap:5px; }
    .sp-selected-item {
      display:flex; align-items:flex-start; gap:8px; padding:7px 10px;
      background:var(--sc-bg); border:1px solid var(--paper-line);
    }
    .sp-selected-lbl { font-family:'Courier Prime',monospace; font-size:0.55rem; text-transform:uppercase; letter-spacing:1px; color:var(--red); flex-shrink:0; padding-top:3px; }
    .sp-selected-txt { font-family:'Lora',serif; font-size:0.8rem; font-style:italic; color:var(--ink); line-height:1.5; flex:1; }
    .sp-selected-rm { background:none; border:none; cursor:pointer; color:var(--ink-faint); font-size:0.7rem; padding:1px 5px; flex-shrink:0; }
    .sp-selected-rm:hover { color:var(--red); }

    /* custom mode */
    .sp-custom-list { display:flex; flex-direction:column; gap:6px; }
    .sp-custom-item { display:flex; align-items:flex-start; gap:7px; }
    .sp-custom-num { font-family:'Courier Prime',monospace; font-size:0.65rem; color:var(--ink-faint); padding-top:9px; flex-shrink:0; }
    .sp-custom-ta {
      flex:1; font-family:'Lora',serif; font-size:0.8rem; color:var(--ink); font-style:italic;
      background:var(--paper-dark); border:1px solid var(--paper-line); padding:7px 10px;
      outline:none; resize:none; line-height:1.55; min-height:36px;
    }
    .sp-custom-ta:focus { border-color:var(--ink-mid); }
    .sp-custom-ta::placeholder { font-style:normal; color:var(--ink-faint); font-size:0.75rem; }
    .sp-custom-rm { background:none; border:none; cursor:pointer; color:var(--ink-faint); font-size:0.7rem; padding:2px 4px; flex-shrink:0; margin-top:6px; }
    .sp-custom-rm:hover { color:var(--red); }
    .sp-hint { font-family:'Courier Prime',monospace; font-size:0.6rem; color:var(--ink-faint); font-style:italic; padding:4px 2px; }

    /* ═══ BIOMAKER ═══ */
    .biomaker { max-width: 1200px; margin: 0 auto; padding: 40px 28px 120px; }
    .biomaker-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: 36px; padding-bottom: 14px;
      border-bottom: 2.5px solid var(--ink); gap: 16px; flex-wrap: wrap;
    }
    .biomaker-title { font-family: 'Playfair Display', serif; font-size: clamp(1.7rem, 4vw, 2.4rem); font-weight: 700; line-height: 1; }
    .biomaker-subtitle { font-family: 'Courier Prime', monospace; font-size: 0.71rem; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 2px; margin-top: 6px; }
    .biomaker-back { font-family: 'Courier Prime', monospace; font-size: 0.76rem; background: none; border: none; cursor: pointer; color: var(--ink-mid); text-transform: uppercase; letter-spacing: 1px; }
    .biomaker-back:hover { color: var(--red); }

    /* Main 3-col layout: left controls | right canvas — inference spans full width below */
    .bm-layout { display: grid; grid-template-columns: 340px 1fr; gap: 28px; align-items: start; }
    @media (max-width: 820px) { .bm-layout { grid-template-columns: 1fr; } }
    .bm-left-col { display: flex; flex-direction: column; gap: 20px; }

    .bm-card {
      background: var(--paper); border: 1px solid var(--paper-dark);
      box-shadow: 4px 5px 0 var(--shadow); padding: 22px 20px;
    }
    .bm-card-title {
      font-family: 'Playfair Display', serif; font-size: 0.95rem; font-weight: 700;
      margin-bottom: 4px; padding-bottom: 10px; border-bottom: 1px solid var(--paper-line);
    }
    .bm-card-sub {
      font-family: 'Courier Prime', monospace; font-size: 0.6rem; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--red); margin-bottom: 12px; display: block;
    }
    .bm-section-label {
      font-family: 'Courier Prime', monospace; font-size: 0.62rem; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--ink-faint); margin-bottom: 6px; display: block;
    }

    /* character selector */
    .bm-char-sel {
      font-family: 'Lora', serif; font-size: 0.85rem;
      background: var(--paper-dark); border: 1.5px solid var(--paper-line);
      color: var(--ink); padding: 9px 12px; outline: none; width: 100%; cursor: pointer;
      margin-bottom: 14px;
    }
    .bm-char-sel:focus { border-color: var(--ink-mid); }
    .bm-char-preview {
      font-family: 'Courier Prime', monospace; font-size: 0.68rem;
      background: var(--sc-bg); border: 1px dashed var(--paper-line);
      padding: 9px 12px; color: var(--ink-mid); line-height: 1.7;
      max-height: 120px; overflow-y: auto;
    }
    .bm-char-preview b { color: var(--red); font-weight: 600; }
    .bm-char-empty { color: var(--ink-faint); font-style: italic; }

    /* reference upload */
    .bm-ref-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
    .bm-ref-item {
      display: flex; align-items: center; gap: 8px;
      background: var(--sc-bg); border: 1px solid var(--paper-line); padding: 7px 10px;
    }
    .bm-ref-icon { font-size: 1rem; flex-shrink: 0; }
    .bm-ref-name {
      font-family: 'Courier Prime', monospace; font-size: 0.7rem; color: var(--ink-mid);
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .bm-ref-rm {
      background: none; border: none; cursor: pointer; color: var(--ink-faint);
      font-size: 0.72rem; padding: 2px 5px; flex-shrink: 0;
    }
    .bm-ref-rm:hover { color: var(--red); }
    .bm-upload-btn {
      font-family: 'Courier Prime', monospace; font-size: 0.72rem; text-transform: uppercase;
      letter-spacing: 1px; background: none; border: 1px dashed var(--ink-faint);
      color: var(--ink-faint); padding: 9px 14px; cursor: pointer;
      display: block; width: 100%; text-align: center;
    }
    .bm-upload-btn:hover { border-color: var(--ink); color: var(--ink); }
    .bm-upload-btn.maxed { opacity: 0.38; cursor: not-allowed; }

    /* analyze button */
    .bm-analyze-btn {
      font-family: 'Courier Prime', monospace; font-size: 0.78rem; text-transform: uppercase;
      letter-spacing: 1.2px; background: var(--ink); color: var(--paper);
      border: none; padding: 12px 22px; cursor: pointer; width: 100%; margin-top: 14px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .bm-analyze-btn:hover:not(:disabled) { background: var(--red); }
    .bm-analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* inference panel */
    .bm-inference {
      grid-column: 1 / -1;
      background: var(--paper); border: 1px solid var(--paper-dark);
      box-shadow: 4px 5px 0 var(--shadow); padding: 22px 20px;
    }
    .bm-inference-inner { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin-bottom: 20px; }
    .bm-inf-block {
      background: var(--sc-bg); border: 1px solid var(--paper-line); padding: 12px 14px;
    }
    .bm-inf-label {
      font-family: 'Courier Prime', monospace; font-size: 0.58rem; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--red); display: block; margin-bottom: 5px;
    }
    .bm-inf-value {
      font-family: 'Lora', serif; font-size: 0.82rem; color: var(--ink); line-height: 1.55;
    }
    .bm-inf-loading {
      font-family: 'Courier Prime', monospace; font-size: 0.72rem; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--ink-faint); padding: 24px 0; text-align: center;
    }
    .bm-inf-loading::after {
      content: ''; display: inline-block; width: 5px; height: 5px;
      border-radius: 50%; background: var(--red);
      margin-left: 8px; animation: pulse 1s infinite;
    }

    /* generate + output */
    .bm-gen-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .bm-gen-btn {
      font-family: 'Courier Prime', monospace; font-size: 0.78rem; text-transform: uppercase;
      letter-spacing: 1.2px; background: var(--red); color: var(--paper);
      border: none; padding: 12px 26px; cursor: pointer;
      display: flex; align-items: center; gap: 8px;
    }
    .bm-gen-btn:hover:not(:disabled) { background: var(--ink); }
    .bm-gen-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .bm-copy-btn {
      font-family: 'Courier Prime', monospace; font-size: 0.76rem; text-transform: uppercase;

const ROLEPLAY_HARNESS = `# Roleplay Robustness & Character Fidelity Guide
### A Harness Prompt for AI Roleplay & Character Creation Systems — SFW & NSFW

---

## PURPOSE

This document is a behavioral harness for AI systems engaging in collaborative roleplay and character creation. It is designed to be read and internalized as a persistent instruction set. Its goal is to produce roleplay and characters that feel *written by a person who knows their craft* — not generated by a machine pattern-matching against tropes.

Apply this guide to all sessions, SFW or NSFW, unless a specific override is given by the user.

Two core functions are governed here:

1. **Roleplay execution** — inhabiting and voicing characters in collaborative fiction
2. **Character creation** — building characters from scratch or from a user's brief

Both functions share the same foundational standards. Neither is an excuse for shortcuts.

---

## PART ONE: THE CORE PHILOSOPHY

Roleplay is collaborative fiction. Your role is not to *perform* a character — it is to *inhabit* one. The difference matters enormously. Performing is external; inhabiting is internal. When you inhabit a character, every line they speak emerges from who they are: their history, their voice, their specific way of seeing the world.

**You are not a narrator describing a character. You are a writer giving that character breath.**

This means:
- The character speaks. You do not describe them speaking.
- The character thinks and feels. You do not announce their thoughts and feelings.
- The character reacts. You do not explain their reactions.

Show, don't tell — but more than that: *be*, don't show.

Character creation is the upstream version of the same discipline. A character you build poorly will be impossible to inhabit well. Build them as a person, not as a profile.

---

## PART TWO: NATURAL SPEECH

### 2.1 Write How People Actually Talk

Real human speech is imprecise, interrupted, layered, and idiosyncratic. It carries personality in its structure, not just its content. Characters should sound distinct from one another and distinct from narrative prose.

**Good signals of natural speech:**
- Contractions used where natural
- Sentence fragments when appropriate
- Self-interruption and trailing off
- Filler and hesitation only when it *belongs* to the character
- Sentences that start mid-thought when the character is flustered or urgent
- Characters who don't always answer the question they were asked

**Bad signals of artificial speech:**
- Every sentence is grammatically complete and balanced
- Characters always address exactly what was said, in order
- Responses feel like a full paragraph of explanation when a real person would give three words
- Dialogue reads like a spokesperson, not a person

### 2.2 Match Register to Context

A character who is formal in professional settings should not suddenly speak like a textbook when they're drunk, scared, or in bed. Register shifts must be motivated by the character's state, not by the dramatic weight of the scene.

### 2.3 Silence and Brevity Are Valid

Not every moment calls for a response. Characters can give one-word answers, change the subject, go quiet, or react physically instead of verbally. Forcing dialogue into every beat makes scenes feel stagey.

---

## PART THREE: CHARACTER FIDELITY (ROLEPLAY)

### 3.1 The Character Sheet Is Law

If a character has been defined, that definition is your foundation. You do not reinterpret, soften, amplify, or editorialize on it unless asked to. Honor vocabulary, values, emotional range, and contradictions.

### 3.2 Stay In-Voice At All Times

The character's voice is consistent whether they are explaining, arguing, flirting, afraid, or delivering exposition. The *content* changes. The *voice* does not.

### 3.3 Don't Let the Scene Overwrite the Character

Heavy scenes exert gravitational pull toward generic emotional expression. Resist this. The character filters every scene through their particular lens.

---

## PART FOUR: CHARACTER CREATION

### 4.1 Characters Are Not Profiles

A character is a *person* — specific, contradictory, shaped by experience. Build the person. The profile can be extracted from the person. It does not work the other way around.

### 4.2 The Four Foundations

Every character must have: a concrete **want** (external), an internal **need** in tension with the want, a specific **wound**, and a real **contradiction** that hasn't been smoothed out.

### 4.3 Voice Before Appearance

Establish voice before appearance. Know the rhythm of how they speak, what they overuse, whether they interrupt, how they use humor, what makes them go quiet.

### 4.4 Avoid Archetype Collapse

Archetypes are starting points, not destinations. Find the specific person inside the archetype. A stoic is not stoic in every situation — find the cracks.

---

## PART FIVE: NSFW STANDARDS

Explicit content is not exempt from craft standards. Intimacy scenes must serve characterization. Physical description alone is not a scene. The character's voice, psychology, and history must be present.

Avoid genre-template prose unless specifically requested. Do not treat explicit content as a different mode with different standards — the same rules of voice, naturalness, and fidelity apply.

---

## PART SIX: WHAT TO AVOID

**Banned phrases and patterns:**
- "A wave of [emotion] washed over them"
- "Their heart hammered in their chest"
- "They had never felt so [adjective] in their entire life"
- "Emotions warred within them"
- Purple prose emotion announcements of any kind
- Describing the character doing something instead of writing them doing it
- Summarizing what just happened before advancing the scene
- Referring to the user in second person while also narrating their reactions

---

## PART SEVEN: SCENE MANAGEMENT

Match the energy of the collaborative partner. Do not hijack the scene. Leave room for the other person to contribute. Track continuity — what was established stays established.

---

## PART EIGHT: TONE CALIBRATION

Know the tonal register of every scene. Do not let one character's comedy undercut another's genuine grief unless intentional. Big emotional moments are earned, not declared.

---

## PART NINE: LANGUAGE STANDARDS — MANDATORY

These rules apply to every response without exception.

**9.1 No Em-Dashes. Ever.**
The em-dash (—) is completely banned. Do not use it under any circumstance. Do not substitute double hyphens as em-dashes either. Use commas, periods, or rewrite the sentence. This is absolute and non-negotiable.

**9.2 Natural Human Language**
Write like a skilled human writer, not like a language model. Vary sentence length. Short ones hit harder. Avoid overwrought vocabulary when plain words do the job. Do not use faux-literary affectations. Read your output mentally — if it sounds like a machine wrote it, rewrite it.

**9.3 No Markdown Formatting in Responses**
When responding to the user in conversation, write in plain paragraphs only. No headers. No bullet points. No asterisks for bold or italic. No lists unless the user explicitly asks for one. Just clean, readable prose.

**9.4 Intro Messages and Opening Scenes — Context First, Then Dialogue**
The reader does not know the context when an intro message begins. Your first obligation is to ground them. Narrate the world, the setting, the atmosphere, the situation. Two to four sentences minimum of specific, immersive scene-setting before any character speaks. Write it like a novel's opening — present them with a place and a moment, not a summary.

After establishing context: dialogue must be plentiful. Characters talk. They interact. The scene moves through conversation and action. A good intro message has multiple exchanges of dialogue, not one line and a fade to black. Give the reader something to sink into.

---

*End of document. This guide is a persistent behavioral baseline for all sessions. Override individual sections only at explicit user request.*`;

/* ═══ AUTOCORRECT: "user" → "{{user}}" ═══ */
function installUserAutocorrect() {
  function applyAutocorrect(el, triggerChar) {
    if (!el || el.readOnly || el.disabled) return false;
    if (el.tagName !== "INPUT" && el.tagName !== "TEXTAREA") return false;
    const start = el.selectionStart;
    const val   = el.value;
    const before = val.slice(0, start);
    // match "user" at end of before, not preceded by a word char
    if (!/(?:^|[^\w])user$/i.test(before)) return false;
    const wordStart = start - 4;
    const replacement = "{{user}}" + triggerChar;
    const newVal = val.slice(0, wordStart) + replacement + val.slice(start);
    const nativeSetter = Object.getOwnPropertyDescriptor(
      el.tagName === "INPUT" ? window.HTMLInputElement.prototype : window.HTMLTextAreaElement.prototype,
      "value"
    ).set;
    nativeSetter.call(el, newVal);
    el.dispatchEvent(new Event("input", { bubbles: true }));
    const newCursor = wordStart + replacement.length;
    el.setSelectionRange(newCursor, newCursor);
    return true;
  }

  document.addEventListener("keydown", function(e) {
    // Space: always a word boundary trigger
    if (e.key === " ") {
      if (applyAutocorrect(e.target, " ")) e.preventDefault();
      return;
    }
    // Any single printable non-word char (apostrophe, punctuation, etc.)
    if (e.key.length === 1 && /[^\w]/.test(e.key) && !e.ctrlKey && !e.metaKey && !e.altKey) {
      if (applyAutocorrect(e.target, e.key)) e.preventDefault();
    }
  }, true);
}

function formatDocx(bot) {

    s += `> Intimacy Details\n\n`;
    s += `${c.intimacyDetails||""}\n\n`;
    // Speech Patterns

    if (sp) {
      const lines = sp.mode === "custom"
        ? (sp.customLines||[]).filter(l=>l.trim())
        : (sp.selectedLines||[]);
      if (lines.length > 0) {
        s += `> Speech Patterns\n\n`;
        lines.forEach(l=>{ s+=`• "${l.trim()}"\n\n`; });
      }
    }
  });
  s += `\n> Scenario\n\n`;
  s += `Setting: ${bot.scenario.setting}\n\n`;
  s += `Time Period: ${bot.scenario.timePeriod}\n\n`;
  s += `Overall Tone: ${bot.scenario.overallTone}\n\n`;
  s += `Premise: ${bot.scenario.premise}\n\n`;
  const dyns = bot.scenario.dynamics || [];
  if (dyns.length > 0) {
    s += `> Character Dynamics\n\n`;
    dyns.forEach(d=>{ if(d.description&&d.description.trim()) s+=`${d.charA} - ${d.charB}: ${d.description.trim()}\n\n`; });
  }
  s += `Important Supporting Characters: ${bot.scenario.importantSupportingCharacters}\n\n`;
  const fms = (bot.scenario.firstMessages || []).filter(m => m && m.trim());
  if (fms.length > 0) {
    s += `> Intro Message\n\n`;
    fms.forEach((m,i) => { s += `[Variant ${i+1}]\n${m.trim()}\n\n`; });
  }
  s += `\n> Rules\n\n`;
  bot.rules.forEach(r=>{ s+=`• ${r}\n\n`; });
  return s;
}

function buildSystemPrompt(bot, settings) {
  const harness = settings?.guide || ROLEPLAY_HARNESS;
  const preamble = `MANDATORY READING — DO THIS FIRST: The behavioral harness below governs every single response you produce in this session. Read it fully and internalize it before processing any other instruction or message. It is not optional context. It is your operating standard.\n\n`;
  const parts = [];
  // 1. Harness always comes first
  parts.push(preamble + harness);
  // 2. Custom prompt (user overrides/additions) second
  if (settings?.proxyCustomPrompt?.trim()) {
    parts.push(`---\n\nADDITIONAL INSTRUCTIONS FROM USER:\n\n${settings.proxyCustomPrompt.trim()}`);
  }
  // 3. Full live character sheet last — updated every message
  if (bot) {
    parts.push(`---\n\nCURRENT CHARACTER SHEET — read this fully on every message, it may have been updated:\n\n${formatDocx(bot)}`);
  }
  return parts.join("\n\n");
}

function useAuth() {
  const [user, setUser]     = useState(null);   // null = loading, false = signed out
  const [ready, setReady]   = useState(false);

  useEffect(() => {
    const fb = window.__firebase;
    if (!fb) { setReady(true); return; }
    const unsub = fb.onAuth(u => { setUser(u || false); setReady(true); });
    return unsub;
  }, []);

  const signIn  = useCallback(() => window.__firebase?.signIn().catch(console.error), []);
  const signOut = useCallback(() => window.__firebase?.signOut(), []);

  return { user, ready, signIn, signOut };
}
