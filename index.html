/* ═══ RULES SECTION ═══ */
function RulesSection({ rules, onChange }) {
  const upd = (i,v) => { const r=[...rules]; r[i]=v; onChange(r); };
  const rm  = i     => onChange(rules.filter((_,j)=>j!==i));
  const add = ()    => onChange([...rules,""]);
  return (
    <div>
      <div className="rlist">
        {rules.map((r,i)=>(
          <div className="rrow" key={i}>
            <span className="rnum">{i+1}.</span>
            <textarea className="rinp" rows={2} value={r} onChange={e=>upd(i,e.target.value)}/>
            <button className="rrm" onClick={()=>rm(i)}>✕</button>
          </div>
        ))}
      </div>
      <button className="gadd" style={{marginTop:"10px"}} onClick={add}>＋ Add Rule</button>
    </div>
  );
}

/* ═══════════════════════════════
   BIOMAKER
═══════════════════════════════ */
function Biomaker({ bots, onBack, settings, dark, onToggle, onSaveBio, onDeleteBio }) {
  const [selBotId,     setSelBotId]     = React.useState(bots.length ? bots[0].id : "");
  const [refs,         setRefs]         = React.useState([]);
  const [inference,    setInference]    = React.useState(null);
  const [output,       setOutput]       = React.useState("");
  const [thinkContent, setThinkContent] = React.useState("");
  const [copyOk,       setCopyOk]       = React.useState(false);
  const [error,        setError]        = React.useState("");
  const [savedOk,      setSavedOk]      = React.useState(false);
  const [viewingSaved, setViewingSaved] = React.useState(null);
  // savedBios come from selectedBot.bios (persisted on the bot itself)
  const savedBios = selectedBot?.bios || [];

  // step: "setup" | "analyzing" | "inferred" | "generating" | "done"
  const [step, setStep] = React.useState("setup");

  // Use a ref for the live "is generation currently running" flag so it is
  // NEVER affected by React batching — this is the source of the ThinkBox bug.
  const generatingRef = React.useRef(false);
  const [genTick, setGenTick] = React.useState(0); // force re-render when ref changes

  const MAX_REFS = 5;
  const selectedBot = bots.find(b => b.id === selBotId) || null;

  const isAnalyzing  = step === "analyzing";
  // isGenerating reads the REF — not step — so it's always accurate mid-stream
  const isGenerating = generatingRef.current;
  const hasInference = ["inferred","done"].includes(step) || isGenerating;
  const hasOutput    = output.length > 0 || isGenerating;

  /* ── Scenario dump ── */
  function scenarioDump(bot) {
    if (!bot) return "";
    const lines = [];
    lines.push(`=== SCENARIO: ${bot.title || "Untitled"} ===\n`);
    bot.characters.forEach((c, i) => {
      lines.push(`--- Character ${i+1}: ${c.name || "Unnamed"} ---`);
      if (c.age)    lines.push(`Age: ${c.age}`);
      if (c.gender) lines.push(`Gender: ${c.gender}`);
      if (c.height) lines.push(`Height: ${c.height}`);
      if (c.physicalAppearances?.trim()) lines.push(`Appearance: ${c.physicalAppearances.trim()}`);
      if (c.personality?.length) lines.push(`Personality: ${c.personality.join(", ")}`);
      if (c.motivation?.trim()) lines.push(`Motivation: ${c.motivation.trim()}`);
      const bs = (c.backstory||[]).map(e=>e.text?.trim()).filter(Boolean);
      if (bs.length) lines.push(`Backstory:\n${bs.map(b=>`• ${b}`).join("\n")}`);
      if (c.intimacyDetails?.trim()) lines.push(`Intimacy Details: ${c.intimacyDetails.trim()}`);
      const sp = c.speechPatterns;
      if (sp) {
        const slines = sp.mode==="custom"
          ? (sp.customLines||[]).filter(l=>l.trim())
          : (sp.selectedLines||[]);
        if (slines.length) lines.push(`Speech Patterns:\n${slines.map(l=>`• "${l}"`).join("\n")}`);
      }
      lines.push("");
    });
    const sc = bot.scenario || {};
    lines.push("--- Scenario ---");
    if (sc.setting?.trim())      lines.push(`Setting: ${sc.setting.trim()}`);
    if (sc.timePeriod?.trim())   lines.push(`Time Period: ${sc.timePeriod.trim()}`);
    if (sc.overallTone?.trim())  lines.push(`Tone: ${sc.overallTone.trim()}`);
    if (sc.premise?.trim())      lines.push(`Premise:\n${sc.premise.trim()}`);
    const dyns = (sc.dynamics||[]).filter(d=>d.description?.trim());
    if (dyns.length) lines.push(`Character Dynamics:\n${dyns.map(d=>`• ${d.charA} ↔ ${d.charB}: ${d.description.trim()}`).join("\n")}`);
    if (sc.importantSupportingCharacters?.trim()) lines.push(`Supporting Cast: ${sc.importantSupportingCharacters.trim()}`);
    const fms = (sc.firstMessages||[]).filter(m=>m?.trim());
    if (fms.length) lines.push(`Intro Message(s):\n${fms.map((m,i)=>`[Variant ${i+1}] ${m.trim()}`).join("\n\n")}`);
    return lines.join("\n");
  }

  /* ── File upload ── */
  const handleFileUpload = async (files) => {
    if (!files || refs.length >= MAX_REFS) return;
    const toAdd = Array.from(files).slice(0, MAX_REFS - refs.length);
    const parsed = await Promise.all(toAdd.map(f => new Promise(resolve => {
      const isImage = f.type.startsWith("image/");
      const reader  = new FileReader();
      if (isImage) {
        reader.onload = ev => resolve({ name: f.name, type:"image", b64: ev.target.result.split(",")[1], mediaType: f.type });
      } else {
        reader.onload = ev => resolve({ name: f.name, type:"text", content: ev.target.result });
      }
      isImage ? reader.readAsDataURL(f) : reader.readAsText(f);
    })));
    setRefs(r => [...r, ...parsed]);
    setError("");
  };

  const removeRef = i => setRefs(r => r.filter((_,j)=>j!==i));

  /* ── Build multimodal content array ── */
  function buildRefContent(refList) {
    const parts = [];
    refList.forEach((ref, i) => {
      if (ref.type === "image") {
        parts.push({ type:"text", text:`[Reference ${i+1}: image "${ref.name}"]` });
        parts.push({ type:"image_url", image_url:{ url:`data:${ref.mediaType};base64,${ref.b64}` } });
      } else {
        parts.push({ type:"text", text:`[Reference ${i+1}: "${ref.name}"]\n${ref.content}` });
      }
    });
    return parts;
  }

  /* ── Analyze references ── */
  const analyze = async () => {
    if (!refs.length) { setError("Upload at least one reference bio first."); return; }
    if (!settings?.apiKey) { setError("No API key set. Open ⚙ Settings."); return; }
    if (!settings?.selectedModel) { setError("No model selected. Open ⚙ Settings."); return; }
    setError(""); setStep("analyzing");

    const refContent = buildRefContent(refs);
    const SYS = `You are a JanitorAI bot bio analyst. Study the provided reference bios and extract detailed style patterns.
Return ONLY valid JSON (no markdown fences, no preamble) with this exact structure:
{
  "pov": "e.g. '2nd person (You are...)', '3rd person narrator', 'mixed'",
  "tone": "e.g. 'dark and melancholic', 'playful and teasing', 'formal and precise'",
  "structure": "describe the layout sections in order",
  "length": "e.g. 'short (100-200 words)', 'medium (300-500 words)', 'long (600+ words)'",
  "formatting": "describe use of line breaks, brackets, separators, bold/italic markers, headers, dividers, etc.",
  "vocabulary": "describe word choice style",
  "openingStyle": "describe how bios typically open",
  "uniqueFeatures": "any distinctive quirks: emoji use, special characters, recurring phrases, unusual formatting, etc.",
  "summary": "2-3 sentence overall characterization of what makes these bios distinctive"
}`;

    try {
      const res = await fetch(`${CHUTES_BASE}/chat/completions`, {
        method: "POST",
        headers: { "Content-Type":"application/json", "Authorization":`Bearer ${settings.apiKey}` },
        body: JSON.stringify({
          model: settings.selectedModel, max_tokens: 1200, stream: false,
          messages: [
            { role:"system", content: SYS },
            { role:"user",   content: [
              { type:"text", text:`Analyze these ${refs.length} reference JanitorAI bio(s) and return the JSON inference:` },
              ...refContent
            ]}
          ]
        })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const d   = await res.json();
      let raw   = (d.choices?.[0]?.message?.content || "").trim();
      raw = raw.replace(/```(?:json)?/gi, "").trim();
      const jsonMatch = raw.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error("Model did not return a valid JSON object. Try again or switch models.");
      const inf = JSON.parse(jsonMatch[0]);
      setInference(inf);
      setStep("inferred");
    } catch(e) {
      setError(`Analysis failed: ${e.message}`);
      setStep("setup");
    }
  };

  /* ── Generate bio ── */
  const generate = async () => {
    if (!selectedBot) { setError("Select a scenario card first."); return; }
    if (!inference)   { setError("Analyze references first."); return; }
    if (!settings?.apiKey || !settings?.selectedModel) { setError("API key / model not set."); return; }
    if (generatingRef.current) return; // prevent double-tap

    setError("");
    setOutput("");
    setThinkContent("");
    setViewingSaved(null);
    // Mark generating BEFORE any await so the UI updates immediately
    generatingRef.current = true;
    setGenTick(t => t + 1);

    const dump       = scenarioDump(selectedBot);
    const refContent = buildRefContent(refs);

    const SYS = `You are an expert JanitorAI bot bio writer. Your job is to write a character bio that reads like it was written by a thoughtful, experienced human writer — not an AI.

STRICT RULES — never break these:
- NEVER use em-dashes (— or –). Replace them with commas, periods, or rewrite the sentence entirely.
- Do NOT use purple prose or over-the-top dramatic language. If the reference material is very dramatic, dial it back to something interesting but grounded.
- Write naturally and with flow. Introduce characters and their world chronologically and systematically, like you are introducing someone fascinating to a new reader. Keep it readable and human, not robotic or list-like.
- Match the structural pattern, POV, length, and formatting of the references exactly, but filter out melodrama.
- Output the bio text ONLY. No explanations, no headers, no markdown fences, no meta-commentary.`;

    const userContent = [
      { type:"text", text:"Here are the reference bios you studied:" },
      ...refContent,
      { type:"text", text:
`Style patterns inferred from those references:
POV: ${inference.pov}
Tone: ${inference.tone} (apply with restraint — natural and engaging, not overdramatic)
Structure: ${inference.structure}
Length: ${inference.length}
Formatting: ${inference.formatting}
Vocabulary: ${inference.vocabulary} (vivid but never overwrought)
Opening style: ${inference.openingStyle}
Unique features: ${inference.uniqueFeatures}

Now write the JanitorAI bot bio for the scenario below. Follow the structure, length, and formatting of the references. Incorporate all characters, the setting, premise, and dynamics naturally. Write like a skilled human author: clear, specific, engaging.

SCENARIO DATA:
${dump}

Write the bio now. Output ONLY the bio text. No em-dashes. No melodrama. No AI-sounding language.`
      }
    ];

    try {
      const res = await fetch(`${CHUTES_BASE}/chat/completions`, {
        method: "POST",
        headers: { "Content-Type":"application/json", "Authorization":`Bearer ${settings.apiKey}` },
        body: JSON.stringify({
          model: settings.selectedModel,
          max_tokens: Math.max(settings.proxyMaxTokens || 1500, 2000),
          stream: true,
          messages: [{ role:"system", content: SYS }, { role:"user", content: userContent }]
        })
      });
      if (!res.ok) {
        const errText = await res.text().catch(() => "");
        throw new Error(`HTTP ${res.status}${errText ? ": " + errText.slice(0,120) : ""}`);
      }
      if (!res.body) throw new Error("No response body — streaming not supported by this endpoint.");

      const reader   = res.body.getReader();
      const dec      = new TextDecoder();
      let   rawAll   = "";
      let   leftover = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = dec.decode(value, { stream: true });
        const lines = (leftover + chunk).split("\n");
        leftover = lines.pop();

        for (const line of lines) {
          const l = line.trim();
          if (!l || l === "data: [DONE]") continue;
          if (l.startsWith("data: ")) {
            try {
              const parsed = JSON.parse(l.slice(6));
              const delta  = parsed.choices?.[0]?.delta?.content;
              if (typeof delta === "string") {
                rawAll += delta;
                // Real-time: split think vs bio
                // Everything inside the LAST unclosed <think> is still thinking
                const closedThink  = rawAll.replace(/<think>([\s\S]*?)<\/think>/gi, (_, inner) => {
                  return `\x00THINK\x00${inner.trim()}\x00/THINK\x00`;
                });
                const thinkParts   = [];
                const withoutThink = closedThink.replace(/\x00THINK\x00([\s\S]*?)\x00\/THINK\x00/g, (_, t) => {
                  thinkParts.push(t); return "";
                });
                // Check for an open (not yet closed) think block
                const openThinkMatch = rawAll.match(/<think>([\s\S]*)$/i);
                const liveThink = openThinkMatch
                  ? rawAll.replace(/^[\s\S]*<think>/i, "")   // everything after the last <think>
                  : "";
                const allThink = [...thinkParts, liveThink].filter(Boolean).join("\n\n");
                setThinkContent(allThink);
                setOutput(withoutThink.trim());
              }
            } catch {}
          }
        }
      }
      // Final clean parse
      const { thinkContent: tc, content: bio } = parseThink(rawAll);
      setThinkContent(tc);
      setOutput(bio);
      setStep("done");

    } catch(e) {
      setError(`Generation failed: ${e.message}`);
      setStep(inference ? "inferred" : "setup");
    } finally {
      generatingRef.current = false;
      setGenTick(t => t + 1);
    }
  };

  /* ── Save bio to bot ── */
  const saveBio = () => {
    if (!output.trim() || !selectedBot) return;
    if (onSaveBio) onSaveBio(selectedBot.id, output.trim());
    setSavedOk(true);
    setTimeout(() => setSavedOk(false), 2000);
  };

  const deleteSaved = (id) => {
    if (!selectedBot || !onSaveBio) return;
    // We signal deletion by calling a special remove path — we patch bios directly via callback
    // Since onSaveBio adds, we need onDeleteBio. For now patch via onSaveBio with sentinel.
    // Actually wire a deleteBio prop:
    if (onDeleteBio) onDeleteBio(selectedBot.id, id);
    if (viewingSaved === id) { setViewingSaved(null); setOutput(""); }
  };

  const loadSaved = (entry) => {
    setViewingSaved(entry.id);
    setOutput(entry.text);
    setThinkContent("");
  };

  const copyOutput = () => {
    navigator.clipboard.writeText(output).then(() => {
      setCopyOk(true); setTimeout(() => setCopyOk(false), 2200);
    });
  };

  const INF_FIELDS = [
    { key:"pov",           label:"Point of View"   },
    { key:"tone",          label:"Tone"             },
    { key:"openingStyle",  label:"Opening Style"    },
    { key:"structure",     label:"Structure"        },
    { key:"length",        label:"Length"           },
    { key:"formatting",    label:"Formatting"       },
    { key:"vocabulary",    label:"Vocabulary"       },
    { key:"uniqueFeatures",label:"Unique Features"  },
    { key:"summary",       label:"Overall Read"     },
  ];

  return (
    <div className="biomaker">
      {/* header */}
      <div className="biomaker-header">
        <div>
          <div className="biomaker-title">✦ Biomaker</div>
          <div className="biomaker-subtitle">JanitorAI Bot Bio Generator</div>
        </div>
        <button className="biomaker-back" onClick={onBack}>← Back to Dashboard</button>
      </div>

      {/* step indicator */}
      <div className="bm-steps">
        <div className={`bm-step ${step==="setup"?"active":hasInference?"done":""}`}>1. Select &amp; Upload</div>
        <div className={`bm-step ${step==="analyzing"?"active":hasInference?"done":""}`}>2. Analyze</div>
        <div className={`bm-step ${step==="inferred"?"active":(isGenerating||step==="done")?"done":""}`}>3. Review Style</div>
        <div className={`bm-step ${isGenerating?"active":step==="done"?"done":""}`}>4. Generate</div>
      </div>

      <div className="bm-layout">
        {/* ── LEFT COLUMN ── */}
        <div className="bm-left-col">

          {/* Scenario picker */}
          <div className="bm-card">
            <div className="bm-card-title">Scenario Card</div>
            <span className="bm-card-sub">Step 1a — pick which scenario to write a bio for</span>

            {bots.length === 0 ? (
              <div className="bm-char-preview" style={{marginTop:0}}>
                <span className="bm-char-empty">No scenario cards yet — create one from the dashboard first.</span>
              </div>
            ) : (
              <>
                <span className="bm-section-label">Select scenario</span>
                <select className="bm-char-sel" value={selBotId}
                  onChange={e=>{setSelBotId(e.target.value); setOutput(""); setStep(s=>s==="done"?"inferred":s);}}>
                  {bots.map(b=>(
                    <option key={b.id} value={b.id}>{b.title || "Untitled Scenario"}</option>
                  ))}
                </select>
                {selectedBot && (
                  <>
                    <span className="bm-section-label">Scenario snapshot</span>
                    <div className="bm-char-preview">
                      <b>{selectedBot.title || "Untitled"}</b><br/>
                      {selectedBot.characters.map((c,i)=>(
                        <span key={c.id}>
                          {i>0 && " · "}
                          <span style={{color:"var(--red)"}}>{c.name||`Char ${i+1}`}</span>
                          {c.age ? ` ${c.age}y` : ""}
                          {c.gender ? ` ${c.gender}` : ""}
                        </span>
                      ))}
                      {selectedBot.scenario?.setting?.trim() && <><br/><em>{selectedBot.scenario.setting.slice(0,80)}{selectedBot.scenario.setting.length>80?"…":""}</em></>}
                      {selectedBot.scenario?.overallTone?.trim() && <><br/>Tone: {selectedBot.scenario.overallTone.slice(0,60)}</>}
                      {selectedBot.scenario?.premise?.trim() && <><br/>↳ {selectedBot.scenario.premise.slice(0,120)}{selectedBot.scenario.premise.length>120?"…":""}</>}
                    </div>
                  </>
                )}
              </>
            )}
          </div>

          {/* Reference upload */}
          <div className="bm-card">
            <div className="bm-card-title">Reference Bios</div>
            <span className="bm-card-sub">Step 1b — up to 5 example bios to learn from</span>
            <span className="bm-section-label">Uploaded ({refs.length}/{MAX_REFS}) — text files or screenshots</span>

            {refs.length > 0 && (
              <div className="bm-ref-list">
                {refs.map((r,i) => (
                  <div className="bm-ref-item" key={i}>
                    <span className="bm-ref-icon">{r.type==="image"?"🖼":"📄"}</span>
                    <span className="bm-ref-name">{r.name}</span>
                    <button className="bm-ref-rm" onClick={()=>removeRef(i)}>✕</button>
                  </div>
                ))}
              </div>
            )}

            <label className={`bm-upload-btn${refs.length>=MAX_REFS?" maxed":""}`}>
              {refs.length>=MAX_REFS ? `Max ${MAX_REFS} references reached` : `＋ Upload reference${refs.length?` (${MAX_REFS-refs.length} left)`:""}`}
              <input type="file" multiple accept=".txt,.md,text/plain,text/markdown,image/*"
                style={{display:"none"}} disabled={refs.length>=MAX_REFS}
                onChange={e=>{ handleFileUpload(e.target.files); e.target.value=""; }}/>
            </label>

            <div style={{marginTop:"8px",fontFamily:"'Courier Prime',monospace",fontSize:"0.62rem",color:"var(--ink-faint)",lineHeight:1.7}}>
              Upload .txt/.md files with bio text, or screenshots/images of JanitorAI bios. The AI reads both.
            </div>

            <button className="bm-analyze-btn" onClick={analyze}
              disabled={!refs.length || isAnalyzing || isGenerating}>
              {isAnalyzing ? "Analyzing references…" : "⊙ Analyze References"}
            </button>
          </div>

          {/* Style inference (shown in left col when present) */}
          {(hasInference || isAnalyzing) && (
            <div className="bm-card">
              <div className="bm-card-title">Style Inference</div>
              <span className="bm-card-sub">What the AI inferred from your references</span>

              {isAnalyzing ? (
                <div className="bm-inf-loading">Reading references</div>
              ) : inference && (
                <>
                  <div className="bm-inference-inner">
                    {INF_FIELDS.map(f => inference[f.key] && (
                      <div className="bm-inf-block" key={f.key}
                        style={(f.key==="summary"||f.key==="structure")?{gridColumn:"1/-1"}:{}}>
                        <span className="bm-inf-label">{f.label}</span>
                        <div className="bm-inf-value">{inference[f.key]}</div>
                      </div>
                    ))}
                  </div>
                </>
              )}
            </div>
          )}

          {/* Saved bios list */}
          {savedBios.length > 0 && (
            <div className="bm-card">
              <div className="bm-card-title">Saved Bios</div>
              <span className="bm-card-sub">Click to reload into canvas</span>
              <div className="bm-saved-list">
                {savedBios.map(b => (
                  <div key={b.id} className={`bm-saved-item${viewingSaved===b.id?" active":""}`}
                    onClick={()=>loadSaved(b)}>
                    <span className="bm-saved-label">
                      <strong>{b.label}</strong>
                      {b.text.slice(0,60)}…
                    </span>
                    <button className="bm-saved-rm" onClick={e=>{e.stopPropagation();deleteSaved(b.id);}}>✕</button>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* ── RIGHT COLUMN: Canvas ── */}
        <div className="bm-canvas-card">
          <div className="bm-card-title">Bio Canvas</div>
          <span className="bm-card-sub">Step 2 — generate, review, and save your bio</span>

          {/* Action row */}
          <div className="bm-canvas-actions">
            <button className="bm-gen-btn" onClick={generate}
              disabled={!inference || !selectedBot || isGenerating || isAnalyzing}>
              {isGenerating ? "✦ Generating…" : "✦ Generate Bio"}
            </button>
            <button className={`bm-save-btn${savedOk?" ok":""}`}
              disabled={!output.trim() || isGenerating}
              onClick={saveBio}>
              {savedOk ? "✓ Saved!" : "⬇ Save Bio"}
            </button>
            <button className={`bm-copy-btn${copyOk?" ok":""}`}
              disabled={!output.trim()}
              onClick={copyOutput}>
              {copyOk ? "✓ Copied!" : "⎘ Copy"}
            </button>
            <button className="bm-copy-btn" style={{marginLeft:"auto"}}
              onClick={()=>{
                setStep(inference?"inferred":"setup");
                setOutput(""); setThinkContent(""); setError(""); setViewingSaved(null);
              }}>
              ↺ Clear
            </button>
          </div>

          {/* ThinkBox — ALWAYS mounted when generating or when there's think content.
              Uses generatingRef directly so it never collapses mid-stream. */}
          {(isGenerating || thinkContent) && (
            <BmThinkBox text={thinkContent} isLive={isGenerating} />
          )}

          {/* Bio output area */}
          <div className="bm-output-wrap">
            <span className="bm-section-label">
              {isGenerating && !output ? "Bio output" : output ? "Bio output" : "Bio output — click Generate Bio to begin"}
            </span>
            <div className="bm-output">
              {output ? output : (
                isGenerating
                  ? <span className="bm-output-empty">
                      {thinkContent ? "Finishing thoughts…" : "Connecting to model…"}
                    </span>
                  : <span className="bm-output-empty">
                      {!inference ? "Analyze references first, then click Generate Bio." : "Ready — click Generate Bio."}
                    </span>
              )}
            </div>
            {output && (
              <div className="bm-token-count">~{countTokens(output)} tokens · {output.length} chars</div>
            )}
          </div>
        </div>
      </div>

      {error && <div className="bm-error">⚠ {error}</div>}
    </div>
  );
}

/* ── Biomaker-specific ThinkBox that reads live ref directly ── */
function BmThinkBox({ text, isLive }) {
  const [open, setOpen] = React.useState(true); // always open by default
  const bodyRef = React.useRef(null);

  // Auto-scroll as tokens arrive
  React.useEffect(() => {
    if (open && bodyRef.current) {
      bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
    }
  }, [text, open]);

  return (
    <div className="think-box" style={{marginBottom:"4px"}}>
      <div className="think-header" onClick={()=>setOpen(o=>!o)}>
        <span className="think-label">
          🧠 Thought process{isLive ? <span style={{color:"var(--red)",marginLeft:"6px",animation:"pulse 1s infinite",display:"inline-block"}}>● live</span> : ""}
        </span>
        <span className="think-chevron">{open?"▲":"▼"}</span>
      </div>
      {open && (
        <div className="think-body" ref={bodyRef}>
          {text
            ? text
            : <span style={{fontStyle:"italic",opacity:0.5}}>Waiting for model to begin thinking…</span>
          }
        </div>
      )}
    </div>
  );
}



/* ═══════════════════════════════════════════════════════════
   INTROS — AI Intro Message Generator
═══════════════════════════════════════════════════════════ */
function Intros({ bots, onBack, settings, onSaveIntro }) {
  const [selBotId,     setSelBotId]     = React.useState(bots.length ? bots[0].id : "");
  const [scenarioDesc, setScenarioDesc] = React.useState("");
  const [output,       setOutput]       = React.useState("");
  const [thinkContent, setThinkContent] = React.useState("");
  const [error,        setError]        = React.useState("");
  const [showSlots,    setShowSlots]    = React.useState(false);
  const [copyOk,       setCopyOk]       = React.useState(false);

  const generatingRef = React.useRef(false);
  const [genTick,      setGenTick]      = React.useState(0);

  const selectedBot = bots.find(b => b.id === selBotId) || null;
  const isGenerating = generatingRef.current;
  const slots = Array.from({length:10}, (_,i) => {
    const fm = selectedBot?.scenario?.firstMessages || [];
    return fm[i] || "";
  });

  /* ── Build scenario dump for prompt ── */
  function buildContext(bot) {
    if (!bot) return "";
    const sc = bot.scenario || {};
    const chars = bot.characters.map(c => {
      const parts = [`${c.name||"Character"}${c.age?` (${c.age})`:""}`];
      if (c.gender) parts.push(c.gender);
      if (c.physicalAppearances?.trim()) parts.push(c.physicalAppearances.slice(0,120));
      if (c.personality?.length) parts.push(`Personality: ${c.personality.slice(0,5).join(", ")}`);
      return parts.join(" — ");
    }).join("\n");
    const lines = [
      `Title: ${bot.title||"Untitled"}`,
      `Characters:\n${chars}`,
      sc.setting    ? `Setting: ${sc.setting}`     : "",
      sc.timePeriod ? `Time Period: ${sc.timePeriod}` : "",
      sc.overallTone? `Overall Tone: ${sc.overallTone}` : "",
      sc.premise?.trim() ? `Premise:\n${sc.premise}` : "",
    ].filter(Boolean);
    return lines.join("\n");
  }

  /* ── Generate intro ── */
  const generate = async () => {
    if (!selectedBot) { setError("Select a bot card first."); return; }
    if (!scenarioDesc.trim()) { setError("Describe the scenario for this intro first."); return; }
    if (!settings?.apiKey || !settings?.selectedModel) { setError("API key / model not configured."); return; }
    if (generatingRef.current) return;

    setError(""); setOutput(""); setThinkContent("");
    generatingRef.current = true;
    setGenTick(t => t + 1);

    const ctx = buildContext(selectedBot);

    const SYS = `You are a JanitorAI intro message writer. Your job is to craft a first-person roleplay intro message — written as the character(s) or narrator — that pulls the user gently into the scene.

STRUCTURAL RULES (always follow in this exact order):
1. OPEN with the setting and immediate context. Paint where we are and what is happening right now, but do NOT launch into significant dramatic action yet. This is the establishing shot.
2. THEN introduce the character(s) naturally — what they are doing, how they appear, what they are thinking or feeling in this moment.
3. ONLY THEN move toward the inciting moment — the beat that will draw {{user}} into the story.
4. Close with a light hook: an action, a glance, a spoken line, or a question that invites {{user}} to respond.

VOICE RULES:
- NEVER use em-dashes (— or –). Use commas, periods, or rewrite.
- Write in the same POV and tone indicated by the character sheet.
- Natural, immersive, human. Not robotic, not melodramatic, not purple prose.
- Match the length and energy of a good JanitorAI intro: enough to set the scene, not a wall of text.
- Do NOT narrate the premise as exposition ("In this world, you are..."). Show it through scene and action.
- Output the intro message ONLY. No preamble, no meta-commentary, no markdown fences.`;

    const userMsg = `CHARACTER SHEET:
${ctx}

USER'S SCENARIO REQUEST:
${scenarioDesc.trim()}

Write the intro message now. Remember: establish context and setting first, introduce characters second, move toward the inciting moment third, end with a hook. No em-dashes. Natural voice. Output ONLY the intro message.`;

    try {
      const res = await fetch(`${CHUTES_BASE}/chat/completions`, {
        method: "POST",
        headers: { "Content-Type":"application/json", "Authorization":`Bearer ${settings.apiKey}` },
        body: JSON.stringify({
          model: settings.selectedModel,
          max_tokens: 1500,
          stream: true,
          messages: [{ role:"system", content:SYS }, { role:"user", content:userMsg }]
        })
      });
      if (!res.ok) {
        const errText = await res.text().catch(()=>"");
        throw new Error(`HTTP ${res.status}${errText?": "+errText.slice(0,100):""}`);
      }
      if (!res.body) throw new Error("No response body.");

      const reader   = res.body.getReader();
      const dec      = new TextDecoder();
      let   rawAll   = "";
      let   leftover = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = dec.decode(value, { stream:true });
        const lines = (leftover + chunk).split("\n");
        leftover = lines.pop();

        for (const line of lines) {
          const l = line.trim();
          if (!l || l === "data: [DONE]") continue;
          if (l.startsWith("data: ")) {
            try {
              const delta = JSON.parse(l.slice(6)).choices?.[0]?.delta?.content;
              if (typeof delta === "string") {
                rawAll += delta;
                const closed = rawAll.replace(/<think>([\s\S]*?)<\/think>/gi, (_,inner)=>`\x00T\x00${inner.trim()}\x00/T\x00`);
                const thinkParts = [];
                const withoutThink = closed.replace(/\x00T\x00([\s\S]*?)\x00\/T\x00/g, (_,t)=>{ thinkParts.push(t); return ""; });
                const openMatch = rawAll.match(/<think>([\s\S]*)$/i);
                const liveThink = openMatch ? rawAll.replace(/^[\s\S]*<think>/i,"") : "";
                setThinkContent([...thinkParts,liveThink].filter(Boolean).join("\n\n"));
                setOutput(withoutThink.trim());
              }
            } catch {}
          }
        }
      }
      const { thinkContent:tc, content:intro } = parseThink(rawAll);
      setThinkContent(tc);
      setOutput(intro);

    } catch(e) {
      setError(`Generation failed: ${e.message}`);
    } finally {
      generatingRef.current = false;
      setGenTick(t => t + 1);
    }
  };

  /* ── Apply to slot ── */
  const applyToSlot = (slotIdx) => {
    if (!output.trim() || !selectedBot) return;
    if (onSaveIntro) onSaveIntro(selectedBot.id, slotIdx, output.trim());
    setShowSlots(false);
  };

  const discard = () => { setOutput(""); setThinkContent(""); };

  return (
    <div className="intros-page">
      {/* Header */}
      <div className="intros-header">
        <div>
          <div className="intros-title">✉ Intros</div>
          <div className="intros-subtitle">AI Intro Message Generator</div>
        </div>
        <button className="intros-back" onClick={onBack}>← Back to Dashboard</button>
      </div>

      <div className="intros-body">
        {/* ── LEFT: Controls + slot list ── */}
        <div style={{display:"flex",flexDirection:"column",gap:"20px"}}>

          {/* Bot selector */}
          <div className="intros-card">
            <div className="intros-card-title">Bot Card</div>
            <span className="intros-card-sub">Which character is this intro for?</span>
            {bots.length === 0 ? (
              <div style={{fontFamily:"'Courier Prime',monospace",fontSize:"0.72rem",color:"var(--ink-faint)",fontStyle:"italic"}}>No bots yet. Create one from the dashboard.</div>
            ) : (
              <>
                <select className="intros-bot-select" value={selBotId}
                  onChange={e=>{ setSelBotId(e.target.value); setOutput(""); setThinkContent(""); }}>
                  {bots.map(b=>(
                    <option key={b.id} value={b.id}>{b.title||"Untitled Scenario"}</option>
                  ))}
                </select>
                {selectedBot && (
                  <div style={{fontFamily:"'Courier Prime',monospace",fontSize:"0.65rem",color:"var(--ink-faint)",lineHeight:1.7,background:"var(--sc-bg)",border:"1px dashed var(--paper-line)",padding:"8px 10px"}}>
                    {selectedBot.characters.map((c,i)=>(
                      <span key={c.id}>{i>0?" · "}<span style={{color:"var(--red)"}}>{c.name||`Char ${i+1}`}</span>{c.age?` ${c.age}y`:""}</span>
                    ))}
                    {selectedBot.scenario?.setting && <><br/><em>{selectedBot.scenario.setting.slice(0,80)}</em></>}
                  </div>
                )}
              </>
            )}
          </div>

          {/* Scenario input */}
          <div className="intros-card">
            <div className="intros-card-title">Scenario</div>
            <span className="intros-card-sub">Describe the specific scene for this intro</span>
            <span className="intros-scenario-label">What is happening right now in this intro?</span>
            <textarea className="intros-scenario-ta"
              placeholder="e.g. The user stumbles into the detective's office late at night. It's raining. The detective is going through old case files and hasn't noticed them yet…"
              value={scenarioDesc}
              onChange={e=>setScenarioDesc(e.target.value)}
              rows={5}
            />
            <button className="intros-gen-btn" onClick={generate}
              disabled={!selectedBot || !scenarioDesc.trim() || isGenerating}>
              {isGenerating
                ? <><span style={{animation:"spin 1s linear infinite",display:"inline-block"}}>⟳</span> Generating…</>
                : "✦ Generate Intro"}
            </button>
            {error && <div style={{fontFamily:"'Courier Prime',monospace",fontSize:"0.7rem",color:"var(--red)",background:"var(--paper)",border:"1.5px solid var(--red)",padding:"8px 12px",marginTop:"10px"}}>⚠ {error}</div>}
          </div>

          {/* Existing intros */}
          {selectedBot && (
            <div className="intros-card">
              <div className="intros-card-title">Saved Intros</div>
              <span className="intros-card-sub">10 slots for this bot card</span>
              <div className="intros-slots">
                {slots.map((text,i)=>(
                  <div key={i} className={`intros-slot${!text?" empty":""}`}
                    onClick={()=>{ if(text){ setOutput(text); setThinkContent(""); } }}>
                    <span className="intros-slot-num">#{i+1}</span>
                    {text
                      ? <span className="intros-slot-text">{text}</span>
                      : <span className="intros-slot-empty-lbl">— empty —</span>
                    }
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* ── RIGHT: Canvas ── */}
        <div className="intros-canvas">
          <div className="intros-card-title">Intro Canvas</div>
          <span className="intros-card-sub">Generated intro message — review before applying</span>

          {/* Actions */}
          {output && (
            <div className="intros-canvas-actions">
              <button className="intros-apply-btn"
                disabled={!output.trim() || isGenerating}
                onClick={()=>setShowSlots(true)}>
                ✓ Apply to Slot
              </button>
              <button className="intros-discard-btn" onClick={discard}>✕ Discard</button>
              <button className={`bm-copy-btn${copyOk?" ok":""}`} style={{marginLeft:"auto"}}
                onClick={()=>{navigator.clipboard.writeText(output).then(()=>{setCopyOk(true);setTimeout(()=>setCopyOk(false),2000);})}}>
                {copyOk?"✓ Copied":"⎘ Copy"}
              </button>
            </div>
          )}

          {/* ThinkBox — always visible while generating */}
          {(isGenerating || thinkContent) && (
            <BmThinkBox text={thinkContent} isLive={isGenerating} />
          )}

          {/* Output area */}
          <div className="intros-output">
            {output ? output : (
              isGenerating
                ? <span className="intros-output-empty">{thinkContent?"Finishing thoughts…":"Connecting to model…"}</span>
                : <span className="intros-output-empty">
                    {!selectedBot
                      ? "Select a bot card to begin."
                      : !scenarioDesc.trim()
                      ? "Describe your scenario, then click Generate Intro."
                      : "Ready — click Generate Intro."}
                  </span>
            )}
          </div>

          {output && (
            <div style={{fontFamily:"'Courier Prime',monospace",fontSize:"0.6rem",color:"var(--ink-faint)",textTransform:"uppercase",letterSpacing:"1px",textAlign:"right"}}>
              ~{countTokens(output)} tokens · {output.length} chars
            </div>
          )}
        </div>
      </div>

      {/* ── Slot picker modal ── */}
      {showSlots && (
        <div className="slot-overlay" onMouseDown={e=>e.target===e.currentTarget&&setShowSlots(false)}>
          <div className="slot-modal">
            <div className="slot-modal-title">Choose a Slot</div>
            <span className="slot-modal-sub">Existing content will be replaced</span>
            <div className="slot-grid">
              {slots.map((text,i)=>(
                <button key={i} className={`slot-btn${text?" has-content":""}`}
                  onClick={()=>applyToSlot(i)}>
                  <span className="slot-n">Slot {i+1}{text?" · filled":""}</span>
                  <span className="slot-preview">{text ? text.slice(0,45)+"…" : "— empty —"}</span>
                </button>
              ))}
            </div>
            <button className="slot-cancel" onClick={()=>setShowSlots(false)}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══ ERROR BOUNDARY ═══ */
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { err: null }; }
  static getDerivedStateFromError(e) { return { err: e }; }
  render() {
    if (this.state.err) {
      return (
        <div style={{padding:"40px",fontFamily:"'Courier Prime',monospace",color:"var(--red)",background:"var(--bg)",minHeight:"100vh"}}>
          <div style={{fontSize:"1.1rem",marginBottom:"12px"}}>⚠ Something went wrong</div>
          <div style={{fontSize:"0.75rem",color:"var(--ink-faint)",whiteSpace:"pre-wrap",wordBreak:"break-all"}}>{String(this.state.err)}</div>
          <button style={{marginTop:"20px",fontFamily:"'Courier Prime',monospace",fontSize:"0.75rem",textTransform:"uppercase",letterSpacing:"1px",background:"none",border:"1px solid var(--ink-faint)",color:"var(--ink-faint)",padding:"8px 16px",cursor:"pointer"}}
            onClick={()=>this.setState({err:null})}>↺ Try to recover</button>
        </div>
      );
    }
    return this.props.children;
  }
}

/* ═══ MOUNT ═══ */
ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
