    const data = liveDraftRef.current || editBot;
    if (!data) return;
    navigator.clipboard.writeText(formatDocx(data)).then(()=>{ setCopyOk(true); setTimeout(()=>setCopyOk(false),2200); });
  };

  const botId       = editBot?.id;
  const chatHistory = botId ? (Array.isArray(chats[botId]) ? chats[botId] : []) : [];
  const setChatHist = msgs => { if(!botId)return; const safe=Array.isArray(msgs)?msgs:[]; setChats(p=>({...p,[botId]:safe})); };
  const getDraft    = () => liveDraftRef.current || editBot;

  const handleImport = importedBots => {
    setBots(prev => [...prev, ...importedBots]);
    if (importedBots.length > 0) {
      setEditBot(JSON.parse(JSON.stringify(importedBots[0])));
      liveDraftRef.current = null;
      setView("editor");
    }
  };

  const userBtn = (
    <UserButton user={user} onSignIn={signIn} onSignOut={signOut} syncing={syncing}/>
  );

  if (!ready) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Courier Prime',monospace",fontSize:"0.8rem",color:"var(--ink-faint)",textTransform:"uppercase",letterSpacing:"2px"}}>
      Loading…
    </div>
  );

  return (
    <div>
      <div className={`panel-backdrop${leftOpen||rightOpen?" visible":""}`}/>

      <LeftPanel
        open={leftOpen} onClose={()=>setLeftOpen(false)}
        settings={settings} onSettings={setSettings}
        models={models} modLoading={modLoading} modError={modError}
        onRefresh={()=>fetchModels(settings.apiKey)}
      />

      {view==="editor" && (
        <RightPanel
          open={rightOpen} onClose={()=>setRightOpen(false)}
          settings={settings} getDraft={getDraft}
          chatHistory={chatHistory} setChatHistory={setChatHist}
          panelWidth={rightPanelWidth} onPanelWidthChange={setRightPanelWidth}
          leftOpen={leftOpen}
        />
      )}

      {view==="dash"
        ? <Dashboard bots={bots} onNew={goNew} onPreview={setPreviewBot}
            dark={dark} onToggle={toggle} onSettings={()=>setLeftOpen(true)}
            userBtn={userBtn} onBiomaker={goBiomaker} onIntros={goIntros}/>
        : view==="biomaker"
        ? <Biomaker bots={bots} onBack={()=>setView("dash")} settings={settings} dark={dark} onToggle={toggle} onSaveBio={(botId,bioText)=>{ setBots(prev=>prev.map(b=>b.id===botId?{...b,bios:[...(b.bios||[]),{id:Date.now().toString(),text:bioText,ts:Date.now()}]}:b)); }} onDeleteBio={(botId,bioId)=>{ setBots(prev=>prev.map(b=>b.id===botId?{...b,bios:(b.bios||[]).filter(x=>x.id!==bioId)}:b)); }}/>
        : view==="intros"
        ? <Intros bots={bots} onBack={()=>setView("dash")} settings={settings}
            onSaveIntro={(botId,slotIdx,text)=>{ setBots(prev=>prev.map(b=>{ if(b.id!==botId)return b; const fm=[...(b.scenario?.firstMessages||[""])]; while(fm.length<=slotIdx)fm.push(""); fm[slotIdx]=text; return {...b,scenario:{...b.scenario,firstMessages:fm}}; })); }}/>
        : <BotEditor
            bot={editBot} onSave={handleSave} onBack={goBack}
            onDraftChange={d=>{liveDraftRef.current=d;}}
            dark={dark} onToggle={toggle}
            onSettings={()=>setLeftOpen(o=>!o)} settingsOpen={leftOpen}
            onChat={()=>setRightOpen(o=>!o)} chatOpen={rightOpen}
            rightPanelWidth={rightOpen ? rightPanelWidth : 0}
            leftPanelWidth={leftOpen ? 330 : 0}
            onCopy={handleCopy} copyOk={copyOk}
            onImport={handleImport}
            userBtn={userBtn}
            settings={settings}
          />
      }

      {previewBot && (
        <PreviewModal bot={previewBot}
          onClose={()=>setPreviewBot(null)}
          onEdit={()=>goEdit(previewBot)}
          onDelete={handleDelete}
        />
      )}
    </div>
  );
}

    if (!pricing) return null;
    const i = pricing.prompt ?? pricing.input ?? pricing.per_input_token;

    if (i==null && o==null) return null;
    const f = n => n!=null ? `$${(parseFloat(n)*1e6).toFixed(3)}/M` : "?";
    return `↑ ${f(i)}  ↓ ${f(o)}`;

  return (
    <div className={`left-panel${open?" open":""}`} onClick={e=>e.stopPropagation()}>

                </div>
              </div>
              <div className="lp-row-2">
                <div className="lp-field">
                  <div className="lp-lbl" style={{fontSize:"0.58rem"}}>Rep. Penalty</div>

          <textarea className="lp-ta" placeholder="e.g. Always write in British English. Avoid exposition dumps…"

        {/* ── Guide Upload ── */}

/* ═══════════════════════════════
   INSERT MODAL — drag-to-sheet
═══════════════════════════════ */
const SCENARIO_FIELDS = [
  { id:"premise",    icon:"🗺",  label:"Premise"      },
  { id:"supporting", icon:"👥",  label:"Supporting Cast" },
  { id:"dynamics",   icon:"↔",  label:"Dynamics"      },
  { id:"setting",    icon:"🏙",  label:"Setting"       },
  { id:"tone",       icon:"🎭",  label:"Tone"          },
];
const CHARACTER_FIELDS = [
  { id:"backstory",     icon:"📖", label:"Backstory"     },
  { id:"motivation",    icon:"🎯", label:"Motivation"    },
  { id:"personality",   icon:"✨", label:"Personality"   },
  { id:"intimacy",      icon:"🌙", label:"Intimacy"      },
  { id:"relationships", icon:"🤝", label:"Relationships" },
  { id:"appearance",    icon:"👁",  label:"Appearance"    },
];

function InsertModal({ content, draft, onApply, onClose, settings }) {
  // "category" | "char-pick" | "loading" | "preview" | "error"
  const [step, setStep]         = useState("category");
  const [category, setCategory] = useState(null);   // "scenario" | "character"
  const [pendingField, setPendingField] = useState(null);
  const [charIdx, setCharIdx]   = useState(0);
  const [result, setResult]     = useState(null);
  const [errMsg, setErrMsg]     = useState("");

  const chars = draft.characters;

  const callAI = async (sysPmt, userPmt) => {
    const res = await fetch(`${CHUTES_BASE}/chat/completions`, {
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":`Bearer ${settings.apiKey}`},
      body:JSON.stringify({
        model: settings.selectedModel,
        messages:[{role:"system",content:sysPmt},{role:"user",content:userPmt}],
        max_tokens: Math.max(settings.proxyMaxTokens || 1024, 4000), stream:false
      })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const d = await res.json();
    return (d.choices?.[0]?.message?.content || "").trim();
  };

  const processField = async (targetField, cIdx) => {
    setStep("loading");
    const SYS = "You are a character sheet extractor. Copy relevant details faithfully from the source text — do not invent, embellish, or pad. Do not add filler phrases, commentary, or explanation. Use only what is explicitly present or clearly implied. Return only the extracted content.";
    const char = chars[cIdx];
    const charName = char?.name || `Character ${cIdx+1}`;
    const prompts = {
      backstory:     `Extract backstory entries for "${charName}" from this text. Format as a bullet list — one entry per line, starting with "- ". Each entry must be 1-2 sentences: the first states the fact clearly, the second adds necessary context or consequence if it meaningfully deepens understanding. Do not pad with filler. Do not omit details that define who the character is, where they come from, or what shaped them. Preserve specific names, places, events, and relationships as given. Do not merge unrelated facts into one entry. Only include what is actually stated or clearly implied in the text.\n\nText:\n${content}`,
      premise:       `Write the scenario premise from this text. Cover: who {{user}} is and their role, who the character(s) are, what is happening, how {{user}} and the character(s) are connected, and what the stakes are. 3-5 sentences. Use present tense. Second person for {{user}}, third person for characters. Stay close to what the text says — do not invent details.\n\nText:\n${content}`,
      motivation:    `What drives "${charName}" in this text? 1-2 sentences. State it directly, no padding.\n\nText:\n${content}`,
      personality:   `From this text, identify personality traits for "${charName}" matching from this list: ${TROPES.join(", ")}. Return ONLY matching trait names, comma-separated, max 6.\n\nText:\n${content}`,
      intimacy:      `Extract intimacy details for "${charName}" from this text. Use exactly this format — fill only what the text mentions, leave the rest blank:\n\nExperience: \nSexual Preferences: \nDesires: \nMoans: \n\nFor Desires: one or two sentences on what they want emotionally and physically. For Moans: phonetic sounds only (e.g. AHHN~! OHH~!). No extra commentary.\n\nText:\n${content}`,
      relationships: `List the key relationships of "${charName}" from this text. One per line: "Name: relationship description". Keep descriptions brief.\n\nText:\n${content}`,
      appearance:    `Describe "${charName}"'s physical appearance as stated in this text. 2-3 sentences, stick to what is mentioned.\n\nText:\n${content}`,
      supporting:    `List supporting characters from this text. One per line: "Name: role or brief description".\n\nText:\n${content}`,
      dynamics:      `Extract character dynamics from this text. One per line: "Char A - Char B: brief description".\n\nText:\n${content}`,
      setting:       `Extract the setting from this text in 1-2 sentences. Location, time period, atmosphere — only what is stated.\n\nText:\n${content}`,
      tone:          `In 3-5 words, what is the tone of this text?\n\nText:\n${content}`,
    };
    try {
      const reply = await callAI(SYS, prompts[targetField]);
      setResult({ type:"single", field:targetField, charIdx:cIdx, text:reply });
      setStep("preview");
    } catch(e) { setErrMsg(e.message); setStep("error"); }
  };

  const handleFieldClick = (fieldId, isCharField) => {
    if (isCharField && chars.length > 1) {
      setPendingField(fieldId);
      setStep("char-pick");
    } else {
      processField(fieldId, charIdx);
    }
  };

  const confirmCharPick = () => {
    processField(pendingField, charIdx);
  };

  const processAIDecide = async () => {
    setStep("loading");
    const charList = chars.map((c,i)=>`${i}: ${c.name||"Character "+(i+1)}`).join(", ");
    const allFieldIds = [...SCENARIO_FIELDS.map(f=>f.id), ...CHARACTER_FIELDS.map(f=>f.id)].join("|");
    const SYS = "You are a JSON extractor. Return ONLY valid JSON. No markdown fences, no explanation.";
    const USR = `Extract character sheet data from this text. Return a JSON object:
{"insertions":[{"field":"${allFieldIds}","charIndex":0,"content":"..."}]}
Available characters: ${charList}

Rules:
- Only extract what is actually in the text. Do not invent or pad.
- backstory: bullet list, one entry per line starting with "- "; each entry is 1-2 sentences — the first states the fact, the second adds context or consequence only if it meaningfully deepens the entry; preserve specific names, places, events, and relationships; do not merge unrelated facts; do not omit character-defining details
- personality: comma-separated trait names only from the allowed list
- intimacy: use this structure exactly: "Experience: \nSexual Preferences: \nDesires: \nMoans: " — fill only what is present; Desires in 1-2 sentences, Moans as phonetic sounds
- premise: 3-5 sentences covering who {{user}} is, who the character(s) are, what is happening, how they connect, and the stakes — present tense, stay close to the source
- all other fields: direct plain text, no filler

Text:\n${content}`;
    try {
      let reply = await callAI(SYS, USR);
      reply = reply.replace(/```json|```/g,"").trim();
      const parsed = JSON.parse(reply);
      setResult({ type:"ai", insertions: parsed.insertions || [] });
      setStep("preview");
    } catch(e) { setErrMsg(e.message); setStep("error"); }
  };

  const applyInsertion = (d, f, ci, text) => {
    const nd = JSON.parse(JSON.stringify(d));
    switch(f) {
      case "backstory": {
        const lines = text.split("\n").map(l=>l.replace(/^[-•*]\s*/,"").trim()).filter(Boolean);
        const char = nd.characters[ci];
        if (char) char.backstory = [...(char.backstory||[]), ...lines.map(t=>({id:uid(),text:t}))];
        break;
      }
      case "motivation": { const c=nd.characters[ci]; if(c) c.motivation=(c.motivation?c.motivation+"\n\n":"")+text; break; }
      case "personality": {
        const c=nd.characters[ci];
        if(c){ const newT=text.split(",").map(t=>t.trim()).filter(t=>TROPES.includes(t)); c.personality=[...new Set([...(c.personality||[]),...newT])]; }
        break;
      }
      case "intimacy": { const c=nd.characters[ci]; if(c) c.intimacyDetails=(c.intimacyDetails?c.intimacyDetails+"\n\n":"")+text; break; }
      case "relationships": { const c=nd.characters[ci]; if(c) c.intimacyDetails=(c.intimacyDetails?c.intimacyDetails+"\n\n":"")+`[Relationships]\n${text}`; break; }
      case "appearance": { const c=nd.characters[ci]; if(c) c.physicalAppearances=(c.physicalAppearances?c.physicalAppearances+" ":"")+text; break; }
      case "premise": nd.scenario.premise=(nd.scenario.premise?nd.scenario.premise+"\n\n":"")+text; break;
      case "supporting": nd.scenario.importantSupportingCharacters=(nd.scenario.importantSupportingCharacters?nd.scenario.importantSupportingCharacters+"\n":"")+text; break;
      case "dynamics": {
        // parse "A - B: desc" lines into dynamics entries
        const lines = text.split("\n").filter(Boolean);
        const existing = nd.scenario.dynamics || [];
        const newDyns = lines.map(l=>{
          const m = l.match(/^(.+?)\s*[-–]\s*(.+?):\s*(.+)$/);
          if(m) return {id:uid(), charA:m[1].trim(), charB:m[2].trim(), description:m[3].trim()};
          return {id:uid(), charA:"", charB:"", description:l.trim()};
        });
        nd.scenario.dynamics = [...existing, ...newDyns];
        break;
      }
      case "setting": nd.scenario.setting=(nd.scenario.setting?nd.scenario.setting+" ":"")+text; break;
      case "tone": nd.scenario.overallTone=text; break;
    }
    return nd;
  };

  const confirm = () => {
    let nd = draft;
    if (result.type==="single") {
      nd = applyInsertion(draft, result.field, result.charIdx, result.text);
    } else {
      for (const ins of result.insertions) nd = applyInsertion(nd, ins.field, ins.charIndex||0, ins.content);
    }
    onApply(nd);
    onClose();
  };

  const fieldLabel = (id) => [...SCENARIO_FIELDS,...CHARACTER_FIELDS].find(f=>f.id===id)?.label || id;
  const isCharSpecific = (id) => CHARACTER_FIELDS.some(f=>f.id===id);

  return (
    <div className="insert-overlay" onMouseDown={e=>e.target===e.currentTarget&&onClose()}>
      <div className="insert-modal" onClick={e=>e.stopPropagation()}>
        <div className="insert-tape"/>
        <div className="insert-head">
          <h3>↓ Insert into Character Sheet</h3>
          <button className="insert-x" onClick={onClose}>✕</button>
        </div>
        <div className="insert-body">
          <div className="insert-preview">{content.slice(0,280)}{content.length>280?"…":""}</div>

          {/* ── Step 1: Choose category ── */}
          {step==="category" && (<>
            <div className="insert-sub">Where does this belong?</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
              <button className="insert-cat-btn" onClick={()=>{setCategory("scenario");setStep("field-pick");}}>
                <span style={{fontSize:"1.4rem",display:"block",marginBottom:"5px"}}>🗺</span>
                Scenario
                <span className="insert-cat-hint">Setting, premise, dynamics, tone, supporting cast</span>
              </button>
              <button className="insert-cat-btn" onClick={()=>{setCategory("character");setStep("field-pick");}}>
                <span style={{fontSize:"1.4rem",display:"block",marginBottom:"5px"}}>🧍</span>
                Character
                <span className="insert-cat-hint">Backstory, personality, motivation, relationships</span>
              </button>
            </div>
            <div className="insert-ai-row">
              <button className="insert-ai-btn" onClick={processAIDecide}>
                ✦ Let AI Decide — auto-assign to all relevant fields
              </button>
            </div>
          </>)}

          {/* ── Step 2: Choose field ── */}
          {step==="field-pick" && (<>
            <div className="insert-sub">{category==="scenario" ? "Scenario Field" : "Character Field"}</div>
            <div className="insert-field-grid">
              {(category==="scenario" ? SCENARIO_FIELDS : CHARACTER_FIELDS).map(f=>(
                <button key={f.id} className="insert-field-btn"
                  onClick={()=>handleFieldClick(f.id, category==="character")}>
                  <span className="insert-field-icon">{f.icon}</span>
                  {f.label}
                </button>
              ))}
            </div>
            <button className="insert-back" onClick={()=>setStep("category")} style={{marginTop:"4px"}}>← Back</button>
          </>)}

          {/* ── Step 3: Pick character (char fields, multi-char only) ── */}
          {step==="char-pick" && (<>
            <div className="insert-sub">Which character?</div>
            <div className="insert-char-row">
              {chars.map((c,i)=>(
                <button key={c.id} className={`insert-char-btn${charIdx===i?" sel":""}`} onClick={()=>setCharIdx(i)}>
                  {c.name||`Char ${i+1}`}
                </button>
              ))}
            </div>
            <div className="insert-actions" style={{marginTop:"6px"}}>
              <button className="insert-confirm" onClick={confirmCharPick}>Continue →</button>
              <button className="insert-back" onClick={()=>setStep("field-pick")}>← Back</button>
            </div>
          </>)}

          {step==="loading" && <div className="insert-loading">Processing with AI…</div>}

          {step==="preview" && result && (<>
            <div className="insert-result-lbl">
              {result.type==="ai"
                ? `AI assigned ${result.insertions.length} field(s)`
                : `Preview — ${fieldLabel(result.field)}${isCharSpecific(result.field)?` → ${chars[result.charIdx]?.name||"Char "+(result.charIdx+1)}`:""}`}
            </div>
            <div className="insert-result-box">
              {result.type==="single"
                ? result.text
                : result.insertions.map(ins=>`[${fieldLabel(ins.field)}${isCharSpecific(ins.field)&&ins.charIndex!=null?` → ${chars[ins.charIndex]?.name||"Char "+(ins.charIndex+1)}`:""  }]\n${ins.content}`).join("\n\n")}
            </div>
            <div className="insert-actions">
              <button className="insert-confirm" onClick={confirm}>✓ Apply to Sheet</button>
              <button className="insert-back" onClick={()=>setStep("category")}>← Back</button>
              <button className="insert-back" onClick={onClose}>Cancel</button>
            </div>
          </>)}

          {step==="error" && (<>
            <div className="insert-error">⚠ {errMsg}</div>
            <div className="insert-actions">
              <button className="insert-back" onClick={()=>setStep("category")}>← Try again</button>
              <button className="insert-back" onClick={onClose}>Cancel</button>
            </div>
          </>)}
        </div>
      </div>
    </div>
  );
}

/* ── Parse <think> tags out of a raw reply ── */
function parseThink(raw) {
  if (!raw) return { thinkContent: "", content: "" };
  // collect all <think>…</think> blocks
  const thinkParts = [];
  const cleaned = raw.replace(/<think>([\s\S]*?)<\/think>/gi, (_, inner) => {
    thinkParts.push(inner.trim());
    return "";
  });
  return {
    thinkContent: thinkParts.join("\n\n"),
    content: cleaned.trim(),
  };
}

/* ── Small collapsible thought box ── */
function ThinkBox({ text, autoOpen }) {
  const [open, setOpen] = useState(!!autoOpen);
  const bodyRef = React.useRef(null);
  // auto-open when generation starts
  const prevAuto = React.useRef(autoOpen);
  React.useEffect(() => {
    if (autoOpen && !prevAuto.current) setOpen(true);
    prevAuto.current = autoOpen;
  }, [autoOpen]);
  // auto-scroll to bottom as think tokens stream in
  React.useEffect(() => {
    if (open && autoOpen && bodyRef.current) {
      bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
    }
  }, [text, open, autoOpen]);
  if (!text && !autoOpen) return null;
  return (
    <div className="think-box">
      <div className="think-header" onClick={()=>setOpen(o=>!o)}>
        <span className="think-label">🧠 Thought process{autoOpen ? " (live…)" : ""}</span>
        <span className="think-chevron">{open?"▲":"▼"}</span>
      </div>
      {open && (
        <div className="think-body" ref={bodyRef}>
          {text || <span style={{fontStyle:"italic",opacity:0.6}}>Waiting for model to start thinking…</span>}
        </div>
      )}
    </div>
  );
}

function RightPanel({ open, onClose, settings, getDraft, chatHistory, setChatHistory, panelWidth, onPanelWidthChange, leftOpen }) {
  const [input,setInput]         = useState("");
  const [isLoading,setLoading]   = useState(false);
  const [showThink,setShowThink] = useState(false);
  const [isFullscreen,setFs]     = useState(false);
  const [lastWidth,setLastWidth]  = useState(panelWidth);
  const [draggingIdx,setDraggingIdx] = useState(null);
  const [copiedIdx,setCopiedIdx]  = useState(null);
  const bottomRef  = useRef(null);
  const panelRef   = useRef(null);
  const handleRef  = useRef(null);
  const abortRef   = useRef(null);

  // LEFT_PANEL_WIDTH: 330px when left panel is open
  const LEFT_W = leftOpen ? 330 : 0;
  // Minimum visible content width for the editor (ebody max-width is 800, we keep at least this)
  const MIN_CONTENT = 480;

  useEffect(()=>{ if(bottomRef.current) bottomRef.current.scrollIntoView({behavior:"smooth"}); },[chatHistory,isLoading]);

  // When leftOpen changes, clamp rightPanelWidth so content area stays visible
  useEffect(() => {
    const maxW = window.innerWidth - LEFT_W - MIN_CONTENT;
    if (panelWidth > maxW && maxW > 0) {
      onPanelWidthChange(Math.max(280, maxW));
    }
  }, [leftOpen]);

  /* ── Resize logic ── */
  const onResizeMouseDown = useCallback(e => {
    e.preventDefault();
    const startX = e.clientX;
    const startW = panelRef.current ? panelRef.current.offsetWidth : panelWidth;

    if (handleRef.current) handleRef.current.classList.add("dragging");

    const onMove = mv => {
      const leftW = leftOpen ? 330 : 0;
      const maxW  = window.innerWidth - leftW - MIN_CONTENT;
      const delta = startX - mv.clientX;
      const newW  = Math.max(280, Math.min(maxW, startW + delta));
      onPanelWidthChange(newW);
      setLastWidth(newW);
    };
    const onUp = () => {
      if (handleRef.current) handleRef.current.classList.remove("dragging");
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup",   onUp);
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup",   onUp);
  }, [panelWidth, leftOpen]);

  const toggleFullscreen = () => {
    setFs(fs => {
      if (!fs) {
        setLastWidth(panelWidth);
      } else {
        onPanelWidthChange(lastWidth);
      }
      return !fs;
    });
  };

  const hasApi = !!(settings.apiKey && settings.selectedModel);
  const draft  = getDraft();
  const charNames = draft?.characters?.map(c=>c.name||"Unnamed").join(", ")||"—";

  const stop = () => {
    if (abortRef.current) { abortRef.current.abort(); abortRef.current = null; }
    setLoading(false);
  };

  const deleteMsg = (idx) => {
    setChatHistory(chatHistory.filter((_,i)=>i!==idx));
  };

  const reroll = async () => {
    // find last assistant msg
    let lastA = -1;
    for (let i=chatHistory.length-1;i>=0;i--) { if(chatHistory[i].role==="assistant"){lastA=i;break;} }
    if (lastA<0) return;
    // find last user msg before it
    let lastU = -1;
    for (let i=lastA-1;i>=0;i--) { if(chatHistory[i].role==="user"){lastU=i;break;} }
    if (lastU<0) return;
    const userText = chatHistory[lastU].content;
    const trimmed  = chatHistory.slice(0, lastU);
    setChatHistory(trimmed);
    await sendWith(userText, trimmed);
  };

  const send = async () => {
    const text = input.trim();
    if (!text||isLoading||!hasApi) return;
    setInput("");
    await sendWith(text, chatHistory);
  };

  const sendWith = async (text, baseHistory) => {
    const sysPmt   = buildSystemPrompt(getDraft(), settings);
    const userMsg  = {role:"user",content:text};
    const apiBase  = baseHistory.map(m=>m.role==="assistant"?{role:"assistant",content:m.content||m._rawContent||""}:m);
    const nextApiHist    = [...apiBase, userMsg];
    const nextDisplayHist = [...baseHistory, userMsg];
    setChatHistory(nextDisplayHist);
    setLoading(true);

    const controller = new AbortController();
    abortRef.current = controller;

    const body = {
      model: settings.selectedModel,
      messages: [{role:"system",content:sysPmt},...nextApiHist],
      max_tokens: settings.proxyMaxTokens || 1024,
      stream: !!settings.proxyStream,
    };
    if (settings.proxyTemp    != null) body.temperature        = settings.proxyTemp;
    if (settings.proxyTopP    != null) body.top_p              = settings.proxyTopP;
    if (settings.proxyTopK    != null) body.top_k              = settings.proxyTopK;
    if (settings.proxyFreqPen != null) body.frequency_penalty  = settings.proxyFreqPen;
    if (settings.proxyPresPen != null) body.presence_penalty   = settings.proxyPresPen;
    if (settings.proxyRepPen  != null) body.repetition_penalty = settings.proxyRepPen;
    if (settings.proxySeed    != null) body.seed               = settings.proxySeed;
    if (settings.proxyCtx     != null) body.max_context_length = settings.proxyCtx;

    try {
      const res = await fetch(`${CHUTES_BASE}/chat/completions`,{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":`Bearer ${settings.apiKey}`},
        body:JSON.stringify(body),
        signal: controller.signal,
      });
      if (!res.ok) { const t=await res.text(); throw new Error(`HTTP ${res.status}: ${t.slice(0,300)}`); }

      if (settings.proxyStream) {
        const reader = res.body.getReader();
        const dec    = new TextDecoder();
        let buf="",rawReply="";
        setChatHistory([...nextDisplayHist,{role:"assistant",content:"",thinkContent:"",_rawContent:""}]);
        setLoading(false);
        while(true){
          const {done,value} = await reader.read();
          if(done) break;
          buf += dec.decode(value,{stream:true});
          const lines = buf.split("\n");
          buf = lines.pop()??"";
          for(const line of lines){
            const l=line.trim();
            if(!l||l==="data: [DONE]") continue;
            if(l.startsWith("data: ")){
              try{
                const chunk=JSON.parse(l.slice(6));
                const delta=chunk.choices?.[0]?.delta?.content;
                if(typeof delta==="string"){
                  rawReply+=delta;
                  const {thinkContent,content}=parseThink(rawReply);
                  setChatHistory([...nextDisplayHist,{role:"assistant",content,thinkContent,_rawContent:rawReply}]);
                }
              }catch{}
            }
          }
        }
        const finalRaw=rawReply||"(empty response)";
        const {thinkContent,content}=parseThink(finalRaw);
        setChatHistory([...nextDisplayHist,{role:"assistant",content:content||finalRaw,thinkContent,_rawContent:finalRaw}]);
      } else {
        const data=await res.json();
        const rawReply=data.choices?.[0]?.message?.content||data.error?.message||"(empty response)";
        const {thinkContent,content}=parseThink(rawReply);
        setChatHistory([...nextDisplayHist,{role:"assistant",content:content||rawReply,thinkContent,_rawContent:rawReply}]);
      }
    } catch(e) {
      if (e.name==="AbortError") return;
      setChatHistory([...nextDisplayHist,{role:"assistant",content:`⚠ Error: ${e.message}`,thinkContent:""}]);
    } finally { setLoading(false); abortRef.current=null; }
  };

  const copyMsg = (text, idx) => {
    navigator.clipboard.writeText(text).then(() => {
      setCopiedIdx(idx);
      setTimeout(() => setCopiedIdx(c => c === idx ? null : c), 2000);
    });
  };

  const onKey = e => { if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} };
  const modelShort = settings.selectedModel?.split("/").pop() || settings.selectedModel || "—";

  return (
    <div
      ref={panelRef}
      className={`right-panel${open?" open":""}${isFullscreen?" fullscreen":""}`}
      style={!isFullscreen ? {width: panelWidth + "px"} : undefined}
      onClick={e=>e.stopPropagation()}
    >
      {/* drag-to-resize handle */}
      {!isFullscreen && (
        <div
          ref={handleRef}
          className="rp-resize-handle"
          onMouseDown={onResizeMouseDown}
          title="Drag to resize"
        />
      )}
      <div className="rp-head">
        <h2>✦ Assistant</h2>
        <span className={`rp-badge${draft?" on":" off"}`}>{draft?"Memory Live":"No Context"}</span>
        <button className="rp-fullscreen-btn" onClick={toggleFullscreen} title={isFullscreen?"Exit fullscreen":"Fullscreen"}>
          {isFullscreen ? "⊡" : "⊡"}
          <span style={{fontSize:"0.65rem",marginLeft:"3px",fontFamily:"'Courier Prime',monospace",textTransform:"uppercase",letterSpacing:"0.5px"}}>
            {isFullscreen ? "exit" : "full"}
          </span>
        </button>
        <button className="rp-x" onClick={onClose}>✕</button>
      </div>

      {!hasApi ? (
        <div className="no-api-msg">
          <p>Open ⚙ Settings,<br/>enter your Chutes API key<br/>and select a model<br/>to use the assistant.</p>
        </div>
      ) : (
        <>
          <div className="chat-msgs">
            {chatHistory.length===0 && !isLoading && (
              <div className="chat-empty">
                <div className="chat-empty-t">Begin the conversation</div>
                <div className="chat-empty-s">Characters in memory:<br/>{charNames}</div>
              </div>
            )}
            {chatHistory.map((m,i)=>(
              <div key={i}
                className={`chat-msg-wrap ${m.role}`}
                draggable={m.role==="assistant"}
                onDragStart={e=>{
                  if(m.role!=="assistant") return;
                  e.dataTransfer.setData("text/plain", m.content||"");
                  e.dataTransfer.effectAllowed="copy";
                  setDraggingIdx(i);
                }}
                onDragEnd={()=>setDraggingIdx(null)}
              >
                <span className="chat-role-lbl">{m.role==="user"?"You":"Assistant"}</span>
                {m.role==="assistant" && showThink && m.thinkContent && (
                  <ThinkBox text={m.thinkContent}/>
                )}
                <div className={`chat-bubble${draggingIdx===i?" is-dragging":""}`}>{m.content}</div>
                <div className="chat-msg-actions">
                  {m.role==="assistant" && (
                    <>
                      <span className="msg-drag-hint" title="Drag to character sheet">⠿ drag to sheet</span>
                      <button
                        className={`msg-act-btn${copiedIdx===i?" ok":""}`}
                        onClick={()=>copyMsg(m.content||"", i)}
                        title="Copy message"
                      >{copiedIdx===i ? "✓ Copied" : "⎘ Copy"}</button>
                      {i===chatHistory.length-1 && !isLoading && (
                        <button className="msg-act-btn" onClick={reroll} title="Reroll this response">↺ Reroll</button>
                      )}
                    </>
                  )}
                  <button className="msg-act-btn danger" onClick={()=>deleteMsg(i)} title="Delete message">✕</button>
                </div>
              </div>
            ))}
            {isLoading && <div className="chat-thinking">Thinking…</div>}
            <div ref={bottomRef}/>
          </div>

          <div className="chat-foot">
            <div className="chat-model-row">
              <span className="chat-model-lbl">Model: <span>{modelShort}</span></span>
              <button className="chat-clear-btn" onClick={()=>setChatHistory([])}>Clear</button>
            </div>
            <div className="think-toggle-row">
              <span className="think-toggle-lbl">Show thinking</span>
              <label className="think-tog">
                <input type="checkbox" checked={showThink} onChange={e=>setShowThink(e.target.checked)}/>
                <span className="think-tslider"/>
              </label>
            </div>
            <div className="chat-input-row">
              <textarea className="chat-ta" rows={2}
                placeholder="Ask about your characters…"
                value={input} onChange={e=>setInput(e.target.value)} onKeyDown={onKey}
                disabled={isLoading}
              />
              {isLoading
                ? <button className="chat-send chat-stop-inline" onClick={stop} title="Stop generation">■</button>
                : <button className="chat-send" onClick={send} disabled={!input.trim()}>➤</button>
              }
            </div>
          </div>
        </>
      )}
    </div>
  );
}

/* ═══════════════════════════════

function ImportModal({ onClose, onImport }) {
  const [dragOver, setDragOver] = useState(false);
  const [error, setError]       = useState("");

  const processFile = file => {
    if (!file) return;
    if (!file.name.endsWith(".json") && file.type !== "application/json") {
      setError("Please select a valid .json file.");
      return;
    }
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        // Accept either a single bot object or an array of bots
        const bots = Array.isArray(data) ? data : [data];
        // Basic validation — each needs at least an id and characters array
        const valid = bots.filter(b => b && typeof b === "object" && Array.isArray(b.characters));
        if (valid.length === 0) { setError("No valid character data found in this file."); return; }
        // Assign fresh IDs to avoid collisions
        const imported = valid.map(b => {
          // migrate firstMessages from first character to scenario if needed
          const scenFM = (b.scenario && b.scenario.firstMessages && b.scenario.firstMessages.length > 0)
            ? b.scenario.firstMessages
            : ((b.characters && b.characters[0] && b.characters[0].firstMessages && b.characters[0].firstMessages.some(m=>m.trim()))
                ? b.characters[0].firstMessages
                : [""]);
          return {
            ...b,
            id: uid(),
            createdAt: b.createdAt || new Date().toISOString(),
            characters: (b.characters||[]).map(c => ({...c, id: uid(),
              speechPatterns: c.speechPatterns || { mode:"preset", presetId:null, selectedLines:[], customLines:[] },
            })),
            scenario: { ...(b.scenario || {}), firstMessages: scenFM },
            rules: b.rules || [...DEFAULT_RULES],
          };
        });
        onImport(imported);
        onClose();
      } catch {
        setError("Could not parse JSON. Make sure the file is valid.");
      }
    };
    reader.readAsText(file);
  };

  const onDrop = e => {
    e.preventDefault(); setDragOver(false);
    const file = e.dataTransfer.files?.[0];
    processFile(file);
  };

  return (
    <div className="import-overlay" onMouseDown={e=>e.target===e.currentTarget&&onClose()}>
      <div className="import-modal" onClick={e=>e.stopPropagation()}>
        <div className="import-tape"/>
        <button className="import-close" onClick={onClose}>✕</button>
        <div className="import-body">
          <div className="import-title">Import Characters</div>
          <div className="import-sub">JSON file — single bot or array of bots</div>

          <div
            className={`import-drop${dragOver?" drag-over":""}`}
            onDragOver={e=>{e.preventDefault();setDragOver(true);}}
            onDragEnter={e=>{e.preventDefault();setDragOver(true);}}
            onDragLeave={()=>setDragOver(false)}
            onDrop={onDrop}
          >
            <div className="import-drop-icon">{dragOver ? "📂" : "📄"}</div>
            <div className="import-drop-text">Drop your .json file here</div>
            <div className="import-drop-hint">or click to browse</div>

              className="import-file-input"
              type="file" accept=".json,application/json"
              onChange={e=>{ processFile(e.target.files?.[0]); e.target.value=""; }}
            />
          </div>

          {error && <div className="import-error">⚠ {error}</div>}

          <div className="import-actions">
            <button className="btn-a btn-dim" onClick={onClose}>Cancel</button>
          </div>

function FileMenu({ draft, onImport }) {
  const [open, setOpen]         = useState(false);
  const [showImport, setImport] = useState(false);
  const wrapRef                 = useRef(null);

  // Close dropdown on outside click
  useEffect(() => {
    if (!open) return;
    const handler = e => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [open]);

  const exportJson = () => {
    const data = JSON.stringify(draft, null, 2);
    const blob  = new Blob([data], {type:"application/json"});
    const url   = URL.createObjectURL(blob);
    const a     = document.createElement("a");
    a.href = url;
    a.download = `${(draft.title||"character").replace(/[^a-z0-9]/gi,"_").toLowerCase()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    setOpen(false);
  };

  return (
    <>
      <div className="file-menu-wrap" ref={wrapRef}>
        <button
          className={`btn-topbar-text${open?" active":""}`}
          onClick={()=>setOpen(o=>!o)}
        >
          ⊞ File ▾
        </button>
        {open && (
          <div className="file-dropdown">
            <button className="file-dropdown-item" onClick={()=>{setImport(true);setOpen(false);}}>
              <span>⬆</span> Import JSON
            </button>
            <button className="file-dropdown-item" onClick={exportJson}>
              <span>⬇</span> Export JSON
            </button>
          </div>
        )}
      </div>

      {showImport && (
        <ImportModal onClose={()=>setImport(false)} onImport={onImport} />
      )}
    </>
  );
}

function BotEditor({ bot, onSave, onBack, onDraftChange, dark, onToggle, onSettings, settingsOpen, onChat, chatOpen, rightPanelWidth, leftPanelWidth, onCopy, copyOk, onImport, userBtn, settings }) {
  const [draft,setDraft]           = useState(()=>JSON.parse(JSON.stringify(bot)));
  const [toastKey,setToastKey]     = useState(null);
  const [insertContent,setInsertContent] = useState(null);
  const [dropActive,setDropActive] = useState(false);
  // autosave: "idle" | "dirty" | "saving" | "saved"
  const [saveStatus,setSaveStatus] = useState("idle");
  const autosaveTimer  = useRef(null);
  const isFirstRender  = useRef(true);
  const topbarRef      = useRef(null);
  const dropRef        = useRef(null);

  // Keep --topbar-h CSS variable in sync with actual topbar height
  useEffect(() => {
    const el = topbarRef.current;
    if (!el) return;
    const update = () => {
      document.documentElement.style.setProperty('--topbar-h', el.offsetHeight + 'px');
    };
    update();
    const ro = new ResizeObserver(update);
    ro.observe(el);
    return () => { ro.disconnect(); document.documentElement.style.removeProperty('--topbar-h'); };
  }, []);

  const pSc  = (k,v)   => setDraft(d=>({...d,scenario:{...d.scenario,[k]:v}}));
  const pCh  = (id,fn) => setDraft(d=>({...d,characters:d.characters.map(c=>c.id===id?fn(c):c)}));
  const addC = ()      => setDraft(d=>({...d,characters:[...d.characters,newChar()]}));
  const rmC  = id      => setDraft(d=>({...d,characters:d.characters.filter(c=>c.id!==id)}));

  useEffect(()=>{ if(onDraftChange) onDraftChange(draft); },[draft]);

  // ── Autosave on draft change (debounced, 1.8 s) ──
  useEffect(() => {
    if (isFirstRender.current) { isFirstRender.current = false; return; }
    setSaveStatus("dirty");
    clearTimeout(autosaveTimer.current);
    autosaveTimer.current = setTimeout(() => {
      setSaveStatus("saving");
      // tiny async tick so "saving" state renders before the sync work
      setTimeout(() => {
        onSave(draft);
        setSaveStatus("saved");
        // revert to idle after 2.5 s
        setTimeout(() => setSaveStatus("idle"), 2500);
      }, 80);
    }, 1800);
    return () => clearTimeout(autosaveTimer.current);
  }, [draft]);

  const handleSave = () => {
    clearTimeout(autosaveTimer.current);
    setSaveStatus("saving");
    setTimeout(() => {
      onSave(draft);
      setToastKey(k => (k||0) + 1);
      setSaveStatus("saved");
      setTimeout(() => setSaveStatus("idle"), 2500);
    }, 80);
  };

  useEffect(()=>{
    const onKey = e => { if((e.ctrlKey||e.metaKey)&&e.key==="s"){ e.preventDefault(); handleSave(); } };
    window.addEventListener("keydown",onKey);
    return ()=>window.removeEventListener("keydown",onKey);
  },[draft]);

  const statusLabel = { idle:"All saved", dirty:"Unsaved changes", saving:"Saving…", saved:"Saved" }[saveStatus];

  return (
    <div className="editor">
      {toastKey && <SavedToast key={toastKey} />}
      {insertContent && (
        <InsertModal
          content={insertContent}
          draft={draft}
          settings={settings}
          onApply={nd=>{ setDraft(nd); }}
          onClose={()=>setInsertContent(null)}
        />
      )}
      <div className="topbar" ref={topbarRef}>
        <button className="btn-back" onClick={onBack}>← Back</button>
        <input className="title-inp" placeholder="Scenario title…"
          value={draft.title} onChange={e=>setDraft(d=>({...d,title:e.target.value}))} />
        <div className={`autosave-status ${saveStatus}`}>
          <div className="autosave-dot"/>
          {statusLabel}
        </div>
        <button className={`btn-topbar-icon${settingsOpen?" active":""}`} onClick={onSettings} title="Settings">⚙</button>
        <button className="btn-topbar-icon" onClick={onToggle} title="Toggle theme">{dark?"☀":"☾"}</button>
        <FileMenu draft={draft} onImport={onImport} />
        <button className={`btn-topbar-text${chatOpen?" active":""}`} onClick={onChat}>✦ Assistant</button>
        {(() => {
          const totalText  = formatDocx(draft);
          const totalTok   = countTokens(totalText);
          const cls        = totalTok > 3000 ? "over" : totalTok > 2000 ? "warn" : "";
          return (
            <span className={`total-token-pill${cls?" "+cls:""}`} title="Approximate total tokens for the full copied character sheet">
              ~{fmtTokens(totalTok)} tok
            </span>
          );
        })()}
        <button className={`btn-topbar-text${copyOk?" ok":""}`} onClick={onCopy} title="Copy all to clipboard">
          {copyOk ? "✓ Copied!" : "⎘ Copy All"}
        </button>
        {userBtn}
        <button className={`btn-save${saveStatus==="saved"?" saved":saveStatus==="saving"?" saving":""}`}
          onClick={handleSave} disabled={saveStatus==="saving"}>
          {saveStatus==="saving" ? "Saving…" : saveStatus==="saved" ? "✓ Saved" : "Save"}
        </button>
      </div>
      <div className="ebody-wrap"
        style={{paddingRight:`${rightPanelWidth}px`,paddingLeft:`${leftPanelWidth}px`,transition:'padding 0.32s cubic-bezier(0.4,0,0.2,1)'}}
        onDragOver={e=>{ e.preventDefault(); setDropActive(true); }}
        onDragEnter={e=>{ e.preventDefault(); setDropActive(true); }}
        onDragLeave={e=>{ if(!e.currentTarget.contains(e.relatedTarget)) setDropActive(false); }}
        onDrop={e=>{
          e.preventDefault();
          setDropActive(false);
          const text = e.dataTransfer.getData("text/plain");
          if (text && text.trim()) setInsertContent(text.trim());
        }}
        ref={dropRef}
      >
        <div className={`drop-zone-overlay${dropActive?" active":""}`}>
          <div className="drop-zone-label">↓ Drop to insert into character sheet</div>
        </div>
      <div className="ebody">
        <div className="esec">
          <div className="estitle">
            <span>Characters</span>
            <span className="escount">{draft.characters.length} total</span>
          </div>
          {draft.characters.map((c,i)=>(
            <CharacterPanel key={c.id} char={c} index={i}
              canRemove={draft.characters.length>1}
              onRemove={()=>rmC(c.id)}
              onChange={fn=>pCh(c.id,fn)}
              settings={settings} />
          ))}
          <button className="addchar" onClick={addC}>＋ Add Another Character</button>
        </div>
        <div className="esec">
          <div className="estitle">Scenario</div>
          <ScenarioSection scenario={draft.scenario} characters={draft.characters}
            onSc={pSc} onDynamics={v=>setDraft(d=>({...d,scenario:{...d.scenario,dynamics:v}}))}
            onFirstMessages={v=>setDraft(d=>({...d,scenario:{...d.scenario,firstMessages:v}}))} />
        </div>
        <div className="esec">
          <div className="estitle">Rules</div>
          <RulesSection rules={draft.rules} onChange={r=>setDraft(d=>({...d,rules:r}))} />
        </div>
        {(draft.bios||[]).length > 0 && (
          <div className="esec">
            <div className="estitle">Saved Bios</div>
            <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
              {(draft.bios||[]).map((bio,i)=>(
                <div key={bio.id} style={{background:"var(--sc-bg)",border:"1px solid var(--paper-line)",padding:"14px 16px"}}>
                  <div style={{fontFamily:"'Courier Prime',monospace",fontSize:"0.62rem",textTransform:"uppercase",letterSpacing:"1.5px",color:"var(--red)",marginBottom:"8px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span>Bio {i+1} · {new Date(bio.ts).toLocaleDateString()}</span>
                    <button style={{background:"none",border:"none",cursor:"pointer",color:"var(--ink-faint)",fontSize:"0.7rem",fontFamily:"'Courier Prime',monospace"}}
                      onClick={()=>setDraft(d=>({...d,bios:(d.bios||[]).filter(b=>b.id!==bio.id)}))}>✕ Remove</button>
                  </div>
                  <div style={{fontFamily:"'Lora',serif",fontSize:"0.82rem",lineHeight:"1.75",whiteSpace:"pre-wrap",maxHeight:"220px",overflowY:"auto",color:"var(--ink)"}}>{bio.text}</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
      </div>
    </div>
  );
}

/* ═══ FIRST MESSAGES EDITOR ═══ */
function FirstMessagesEditor({ messages, onChange }) {
  const msgs = (messages && messages.length > 0) ? messages : [""];
  const [idx, setIdx]       = useState(0);
  const [copied, setCopied] = useState(false);
  const taRef               = useRef(null);

  // clamp index if messages shrink
  const safeIdx = Math.min(idx, msgs.length - 1);
  if (safeIdx !== idx) setIdx(safeIdx);

  const current = msgs[safeIdx] || "";

  const upd = val => {
    const next = [...msgs];
    next[safeIdx] = val;
    onChange(next);
    if (taRef.current) { taRef.current.style.height="auto"; taRef.current.style.height=taRef.current.scrollHeight+"px"; }
  };

  const addNew = () => {
    const next = [...msgs, ""];
    onChange(next);
    setIdx(next.length - 1);
  };

  const clear = () => {
    const next = [...msgs];
    next[safeIdx] = "";
    onChange(next);
    if (taRef.current) { taRef.current.style.height="auto"; taRef.current.focus(); }
  };

  const remove = () => {
    if (msgs.length <= 1) { onChange([""]); setIdx(0); return; }
    const next = msgs.filter((_,i)=>i!==safeIdx);
    onChange(next);
    setIdx(Math.max(0, safeIdx - 1));
  };

  const copy = () => {
    if (!current.trim()) return;
    navigator.clipboard.writeText(current).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  useEffect(() => {
    if (taRef.current) { taRef.current.style.height="auto"; taRef.current.style.height=taRef.current.scrollHeight+"px"; }
  }, [safeIdx, current]);

  return (
    <div className="fm-wrap">
      <div className="fm-topbar">
        <button className="fm-nav-btn" onClick={()=>setIdx(i=>Math.max(0,i-1))} disabled={safeIdx===0} title="Previous message">‹</button>
        <span className="fm-counter">{safeIdx+1} / {msgs.length}</span>
        <button className="fm-nav-btn" onClick={()=>setIdx(i=>Math.min(msgs.length-1,i+1))} disabled={safeIdx===msgs.length-1} title="Next message">›</button>
        <button className="fm-btn" onClick={addNew} title="Add new intro message">＋ Add</button>
        <div className="fm-actions">
          <button className={`fm-btn${copied?" ok":""}`} onClick={copy} disabled={!current.trim()} title="Copy this message">
            {copied ? "✓ Copied" : "⎘ Copy"}
          </button>
          <button className="fm-btn danger" onClick={clear} title="Clear this message">Clear</button>
          {msgs.length > 1 && (
            <button className="fm-btn danger" onClick={remove} title="Delete this message">✕ Delete</button>
          )}
        </div>
      </div>
      <textarea
        ref={taRef}
        className="fm-ta"
        placeholder="Write an intro / first message for this character…"
        value={current}
        onChange={e => upd(e.target.value)}
      />
    </div>
  );
}

/* ═══ SPEECH PATTERN EDITOR ═══ */
function SpeechPatternEditor({ value, onChange }) {
  const sp = value || { mode:"preset", presetId:null, selectedLines:[], customLines:[] };
  const set = patch => onChange({ ...sp, ...patch });

  const selectPreset = id => {
    // toggle off if already selected
    if (sp.presetId === id) {
      set({ presetId:null, selectedLines:[] });
    } else {
      set({ presetId:id, selectedLines:[] });
    }
  };

  const toggleLine = line => {
    const already = sp.selectedLines.includes(line);
    set({ selectedLines: already ? sp.selectedLines.filter(l=>l!==line) : [...sp.selectedLines, line] });
  };

  const addCustom = () => set({ customLines:[...(sp.customLines||[]), ""] });
  const updCustom = (i,v) => { const a=[...(sp.customLines||[])]; a[i]=v; set({ customLines:a }); };
  const rmCustom  = i => set({ customLines:(sp.customLines||[]).filter((_,j)=>j!==i) });

  const activePreset = SPEECH_PRESETS.find(p=>p.id===sp.presetId);
  const allLines = sp.mode==="custom" ? (sp.customLines||[]) : (sp.selectedLines||[]);
  const hasContent = sp.mode==="custom" ? allLines.some(l=>l.trim()) : allLines.length > 0;

  const taRefs = useRef({});
  const autoResizeSp = el => { if(!el)return; el.style.height="auto"; el.style.height=el.scrollHeight+"px"; };
  useEffect(()=>{ Object.values(taRefs.current).forEach(autoResizeSp); });

  return (
    <div className="sp-section">
      {/* Mode switcher */}
      <div className="sp-mode-row">
        <button className={`sp-mode-btn${sp.mode==="preset"?" active":""}`} onClick={()=>set({mode:"preset"})}>Browse Presets</button>
        <button className={`sp-mode-btn${sp.mode==="custom"?" active":""}`} onClick={()=>set({mode:"custom"})}>Write Custom</button>
      </div>

      {/* ── PRESET MODE ── */}
      {sp.mode==="preset" && (<>
        <div className="sp-hint">Choose a personality archetype, then pick up to 5 example lines that fit the character.</div>
        <div className="sp-preset-grid">
          {SPEECH_PRESETS.map(p=>(
            <button key={p.id} className={`sp-preset-btn${sp.presetId===p.id?" sel":""}`}
              onClick={()=>selectPreset(p.id)}>
              <span className="sp-preset-name">{p.name}</span>
              <span className="sp-preset-tag">{p.tag}</span>
            </button>
          ))}
        </div>

        {activePreset && (
          <div className="sp-lines-area">
            <div className="sp-lines-header">
              Example Lines — {activePreset.name}
              <span>click to add / remove</span>
            </div>
            {activePreset.lines.map((line,i)=>{
              const sel = sp.selectedLines.includes(line);
              return (
                <div key={i} className={`sp-line-row${sel?" sel":""}`} onClick={()=>toggleLine(line)}>
                  <div className="sp-line-check">{sel?"✓":""}</div>
                  <div className="sp-line-text">"{line}"</div>
                </div>
              );
            })}
          </div>
        )}

        {sp.selectedLines.length > 0 && (
          <div className="sp-lines-area">
            <div className="sp-lines-header">Selected Lines ({sp.selectedLines.length})</div>
            <div className="sp-selected-list">
              {sp.selectedLines.map((line,i)=>(
                <div key={i} className="sp-selected-item">
                  <span className="sp-selected-lbl">#{i+1}</span>
                  <span className="sp-selected-txt">"{line}"</span>
                  <button className="sp-selected-rm" onClick={()=>toggleLine(line)}>✕</button>
                </div>
              ))}
            </div>
          </div>
        )}

        {!activePreset && !hasContent && (
          <div className="sp-hint" style={{color:"var(--ink-faint)"}}>No preset selected yet — pick one above, or switch to Write Custom.</div>
        )}
      </>)}

      {/* ── CUSTOM MODE ── */}
      {sp.mode==="custom" && (<>
        <div className="sp-hint">Write your own example dialogue lines that capture how this character speaks. Each line should be a single statement or reply.</div>
        <div className="sp-custom-list">
          {(sp.customLines||[]).map((line,i)=>(
            <div key={i} className="sp-custom-item">
              <span className="sp-custom-num">{i+1}.</span>
              <textarea className="sp-custom-ta" rows={1} placeholder={`e.g. "Don't flatter yourself — I just happened to be walking this way."`}
                ref={el=>{ if(el){taRefs.current[i]=el;autoResizeSp(el);}else delete taRefs.current[i]; }}
                value={line}
                onChange={ev=>{ updCustom(i,ev.target.value); autoResizeSp(ev.target); }}
              />
              <button className="sp-custom-rm" onClick={()=>rmCustom(i)}>✕</button>
            </div>
          ))}
        </div>
        <button className="gadd" onClick={addCustom}>＋ Add Line</button>
      </>)}
    </div>
  );
}

/* ═══ BACKSTORY LIST ═══ */
const autoResize = el => {
  if (!el) return;
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
};

function BackstoryList({ entries, onChange, settings }) {
  const dragIdx      = useRef(null);
  const [over,setOver] = useState(null);
  const taRefs       = useRef({});
  const pendingFocus = useRef(null);
  const [shortening, setShortening] = useState(false);

  const add = () => {
    const newId = uid();
    pendingFocus.current = newId;
    onChange([...entries,{id:newId,text:""}]);
  };
  const rm  = id => { if(entries.length>1) onChange(entries.filter(e=>e.id!==id)); };

  const shorten = async () => {
    if (!settings?.apiKey || !settings?.selectedModel) return;
    setShortening(true);
    const filled = entries.filter(e=>e.text.trim());
    const allText = filled.map((e,i)=>`${i+1}. ${e.text.trim()}`).join("\n");
    try {
      const res = await fetch(`${CHUTES_BASE}/chat/completions`,{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":`Bearer ${settings.apiKey}`},
        body:JSON.stringify({
          model:settings.selectedModel, max_tokens:600, stream:false,
          messages:[
            {role:"system",content:"You are a concise backstory editor. Return ONLY a numbered list, no preamble."},
            {role:"user",content:`Condense these backstory entries into fewer, tighter entries. Combine related ones, cut redundancy. Keep the most important character-defining details.\n\n${allText}`}
          ]
        })
      });
      const d = await res.json();
      const raw = (d.choices?.[0]?.message?.content||"").trim();
      const lines = raw.split("\n").map(l=>l.replace(/^\d+[.)]\s*/,"").trim()).filter(Boolean);
      onChange(lines.map(t=>({id:uid(),text:t})));
    } catch(e){ console.error(e); }
    finally{ setShortening(false); }
  };

  useEffect(() => {
    if (pendingFocus.current && taRefs.current[pendingFocus.current]) {
      taRefs.current[pendingFocus.current].focus();
      pendingFocus.current = null;
    }
    Object.values(taRefs.current).forEach(autoResize);
  });

  return (
    <div>
      <div className="bs-header-row">
        <button className="bs-shorten-btn" onClick={shorten} disabled={shortening||entries.filter(e=>e.text.trim()).length<2}>
          {shortening?"Condensing…":"⊘ Shorten with AI"}
        </button>
      </div>
      <div className="bslist">
        {entries.map((e,i)=>(
          <div key={e.id} className={`bsitem${over===i?" dragov":""}`} draggable
            onDragStart={()=>{dragIdx.current=i;}}
            onDragOver={ev=>{ev.preventDefault();setOver(i);}}
            onDrop={()=>{ if(dragIdx.current!=null&&dragIdx.current!==i){const a=[...entries];const[x]=a.splice(dragIdx.current,1);a.splice(i,0,x);onChange(a);}dragIdx.current=null;setOver(null); }}
            onDragEnd={()=>{dragIdx.current=null;setOver(null);}}>
            <span className="bsdrag">⠿</span>
            <textarea className="bsta" rows={1} placeholder={`Entry ${i+1}…`}
              ref={el=>{ if(el){ taRefs.current[e.id]=el; autoResize(el); } else delete taRefs.current[e.id]; }}
              value={e.text}
              onChange={ev=>{ upd(e.id,ev.target.value); autoResize(ev.target); }}
              onKeyDown={ev=>{if(ev.key==="Enter"&&!ev.shiftKey){ev.preventDefault();add();}}}/>
            <button className="bsrm" onClick={()=>rm(e.id)}>✕</button>
          </div>
        ))}
      </div>
      <button className="gadd" onClick={add}>＋ Add Entry</button>
    </div>
  );
}

/* ═══ DYNAMICS EDITOR ═══ */
function DynamicsEditor({ dynamics, characters, onChange }) {
  const charOptions = [
    ...characters.map((c,i) => c.name||`Character ${i+1}`),
    "{{user}}"
  ];
  const firstOpt  = charOptions[0] || "Character 1";
  const secondOpt = charOptions[1] || "{{user}}";

  const add = () => onChange([...dynamics, {id:uid(), charA:firstOpt, charB:secondOpt, description:""}]);
  const upd = (id,k,v) => onChange(dynamics.map(d=>d.id===id?{...d,[k]:v}:d));
  const rm  = id => onChange(dynamics.filter(d=>d.id!==id));

  return (
    <div className="scf sp">
      <div className="dyn-list">
        {dynamics.map(d=>(
          <div key={d.id} className="dyn-entry">
            <div className="dyn-pair">
              <select className="dyn-sel" value={d.charA} onChange={e=>upd(d.id,"charA",e.target.value)}>
                {charOptions.map(o=><option key={o} value={o}>{o}</option>)}
              </select>
              <span className="dyn-arrow">↔</span>
              <select className="dyn-sel" value={d.charB} onChange={e=>upd(d.id,"charB",e.target.value)}>
                {charOptions.map(o=><option key={o} value={o}>{o}</option>)}
              </select>
              <button className="dyn-rm" onClick={()=>rm(d.id)}>✕</button>
            </div>
            <textarea className="fta" rows={2} placeholder="Describe their dynamic…"
              value={d.description} onChange={e=>upd(d.id,"description",e.target.value)}/>
          </div>
        ))}
      </div>
      <button className="gadd" onClick={add}>＋ Add Dynamic</button>
    </div>
  );
}

/* ═══ SCENARIO SECTION ═══ */
function ScenarioSection({ scenario, characters, onSc, onDynamics, onFirstMessages }) {

      <input className="finp" placeholder={ph} value={scenario[k]||""} onChange={e=>onSc(k,e.target.value)}/></div>
  );
  const txa = (lbl,k,ph="") => (
    <div className="scf sp"><div className="flbl">{lbl}</div>
      <textarea className="fta" rows={3} placeholder={ph} value={scenario[k]||""} onChange={e=>onSc(k,e.target.value)}/></div>

  return (
    <div className="sc-wrap">
      <div className="scgrid">
        {inp("Setting","setting","e.g. A ruined coastal city")}
        {inp("Time Period","timePeriod","e.g. Post-apocalyptic 2047")}
        {inp("Overall Tone","overallTone","e.g. Dark, melancholic, tense")}
        <div style={{gridColumn:"1/-1"}}/>
        {txa("Premise","premise","Describe the scenario in detail — who {{user}} is and their role, who the character(s) are, what is currently happening, how these events bring {{user}} and the character(s) together, and what the emotional or dramatic stakes are…")}
        <div className="scsub">Character Dynamics</div>
        <DynamicsEditor dynamics={scenario.dynamics||[]} characters={characters} onChange={onDynamics}/>
        <div className="scsub">Supporting Cast</div>
        {txa("Important Supporting Characters","importantSupportingCharacters","List supporting characters and their roles…")}
